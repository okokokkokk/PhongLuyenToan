<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng luyện đề trắc nghiệm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="website icon" type="jpg" href="../../logo.jpg">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 10px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .timer-container {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .q-badge {
            background: rgba(248, 94, 56, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        #q-text { margin: 15px 0; font-size: 1.15rem; font-weight: 500; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option:hover:not(.disabled) { background: rgba(0, 94, 255, 0.07); border-color: var(--text-secondary); }
        .option.selected { border-color: var(--primary); background: rgba(0, 157, 255, 0.1); }
        .option.correct { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .option.wrong { border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .option.disabled { cursor: default; }

        .controls { display: flex; justify-content: space-between; margin-top: 20px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; justify-content: center; margin-top: 15px; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 100%; justify-content: center; margin-top: 10px; }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .nav-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-item.active { border-color: var(--primary); color: var(--primary); outline: 2px solid rgba(56,189,248,0.2); }
        .nav-item.done { background: #334155; color: #fff; }
        .nav-item.correct { background: var(--success); color: #fff; border-color: var(--success); }
        .nav-item.wrong { background: var(--error); color: #fff; border-color: var(--error); }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .hidden { display: none; }
        
        .score-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
        }
        #score-percent { text-align: center; color: var(--text-secondary); font-weight: bold; }
        /* Màu xanh dương đậm khi chọn */
        .option.selected {
            background-color: #2aa2d6 !important; 
            border-color: #1d4ed8 !important;
            color: #ffffff !important; /* Chữ trắng cho nổi bật */
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 5px; }
            
            header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                padding: 10px;
            }

            .main-layout {
                grid-template-columns: 1fr; /* Chuyển thành 1 cột */
            }

            .quiz-section { order: 1; }
            .sidebar { order: 2; }

            .timer-container { font-size: 1.2rem; width: 100%; justify-content: center; display: flex; }
            
            .q-text { font-size: 1.05rem; }
            .option { padding: 12px; font-size: 0.95rem; }
            
            .controls button {
                flex: 1;
                padding: 15px 10px; /* Tăng diện tích chạm */
                font-size: 0.9rem;
            }

            .nav-grid {
                grid-template-columns: repeat(5, 1fr); /* Hiển thị 5 ô trên 1 hàng cho gọn */
            }
        }
    </style>
</head>
<body>
    <!-- Nút quay lại -->
    <div style="padding: 10px; max-width: 1100px; margin: 0 auto;">
        <button onclick="window.history.back()" class="btn btn-secondary" style="width: auto; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Quay lại
        </button>
    </div>
    <div class="container">
        <header>
            <div class="header-info">
                <h1 id="quiz-title">Đạo hàm - Mã đề 02</h1>
                <p id="quiz-subtitle">Thời gian: <span id="limit-time">45</span> phút</p>
            </div>
            <div class="timer-container">
                <i class="fas fa-clock"></i>
                <span id="timer">45:00</span>
            </div>
        </header>

        <div class="main-layout">
            <div class="quiz-section">
                <div id="question-card" class="card">
                    <div class="card-header">
                        <span class="q-badge">Câu <span id="q-current">1</span>/25</span>
                    </div>
                    <h2 id="q-text">Đang tải...</h2>
                    <div id="options-list" class="options-list"></div>
                    <div id="explanation-box" class="explanation-box hidden">
                        <strong><i class="fas fa-lightbulb"></i> Giải thích:</strong>
                        <p id="explanation-text" style="margin-top:5px; color: var(--text-secondary);"></p>
                    </div>
                </div>

                <div class="controls">
                    <button id="prev-btn" class="btn btn-secondary"><i class="fas fa-chevron-left"></i> Câu trước</button>
                    <button id="next-btn" class="btn btn-secondary">Câu sau <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="card">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">Tiến trình làm bài</h3>
                    <div id="nav-grid" class="nav-grid"></div>
                    <button id="submit-btn" class="btn btn-primary">NỘP BÀI</button>
                </div>

                <div id="result-card" class="card hidden">
                    <h3 style="text-align: center;">KẾT QUẢ</h3>
                    <div class="score-display">
                        <span id="score-val">0</span>/<span id="total-val">25</span>
                    </div>
                    <p id="score-percent">0%</p>
                    <button onclick="location.reload()" class="btn btn-outline">Làm lại bài thi</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const QUIZ_DATA = {
            title: "Đề Ôn Tập Đạo Hàm - Mã đề 02",
            time: 45,
            questions: [
                {
                text: "Câu 1: Cho hàm số f(x) = x² - 4x + 1. Tính đạo hàm của hàm số tại điểm x = 2 bằng định nghĩa.",
                options: [
                "f'(2) = 0",
                "f'(2) = -4",
                "f'(2) = 2",
                "f'(2) = -2"
                ],
                correct: 0,
                explanation: "Ta có f'(2) = giới hạn của [f(x) - f(2)]/(x - 2) khi x tiến về 2. f'(x) = 2x - 4, thay x = 2 vào ta được 2.2 - 4 = 0."
                },
                {
                text: "Câu 2: Tính đạo hàm của hàm số y = 2x⁴ - x³ + 5.",
                options: [
                "y' = 8x³ - 3x²",
                "y' = 8x³ - 3x",
                "y' = 4x³ - 3x²",
                "y' = 8x⁴ - 3x²"
                ],
                correct: 0,
                explanation: "Sử dụng quy tắc đạo hàm lũy thừa: y' = 2.4x³ - 3x² = 8x³ - 3x²."
                },
                {
                text: "Câu 3: Tính đạo hàm của hàm số y = 4.cos(x) + 5.sin(x).",
                options: [
                "y' = -4.sin(x) + 5.cos(x)",
                "y' = 4.sin(x) + 5.cos(x)",
                "y' = -4.sin(x) - 5.cos(x)",
                "y' = 4.cos(x) - 5.sin(x)"
                ],
                correct: 0,
                explanation: "Đạo hàm của cos(x) là -sin(x) và của sin(x) là cos(x). Vậy y' = -4.sin(x) + 5.cos(x)."
                },
                {
                text: "Câu 4: Tính đạo hàm của hàm số y = (x - 2).(x² + 3).",
                options: [
                "y' = 3x² - 4x + 3",
                "y' = 3x² + 3",
                "y' = x² - 4x",
                "y' = 2x² - 4x + 3"
                ],
                correct: 0,
                explanation: "Khai triển y = x³ - 2x² + 3x - 6. Đạo hàm y' = 3x² - 4x + 3."
                },
                {
                text: "Câu 5: Cho hàm số y = π². Tính đạo hàm y'.",
                options: [
                "y' = 2π",
                "y' = 0",
                "y' = π",
                "y' = 1"
                ],
                correct: 1,
                explanation: "Vì π là một hằng số nên π² cũng là hằng số. Đạo hàm của hằng số luôn bằng 0."
                },
                {
                text: "Câu 6: Tính đạo hàm của hàm số y = x³ - 6x² + 9x - 4.",
                options: [
                "y' = 3x² - 12x + 9",
                "y' = 3x² - 12x",
                "y' = 3x² - 6x + 9",
                "y' = x² - 12x + 9"
                ],
                correct: 0,
                explanation: "Đạo hàm từng số hạng: 3x² - 6.2x + 9 = 3x² - 12x + 9."
                },
                {
                text: "Câu 7: Tính đạo hàm của hàm số y = căn(2x² + 3).",
                options: [
                "y' = 2x / căn(2x² + 3)",
                "y' = 4x / căn(2x² + 3)",
                "y' = x / căn(2x² + 3)",
                "y' = 1 / [2.căn(2x² + 3)]"
                ],
                correct: 0,
                explanation: "y' = (2x²+3)' / [2.căn(2x²+3)] = 4x / [2.căn(2x²+3)] = 2x / căn(2x² + 3)."
                },
                {
                text: "Câu 8: Tính đạo hàm của hàm số y = (3x + 2) / (x - 2).",
                options: [
                "y' = -8 / (x - 2)²",
                "y' = 8 / (x - 2)²",
                "y' = -4 / (x - 2)²",
                "y' = -8 / (x - 2)"
                ],
                correct: 0,
                explanation: "Sử dụng công thức nhanh: (3.(-2) - 2.1) / (x - 2)² = -8 / (x - 2)²."
                },
                {
                text: "Câu 9: Tính đạo hàm của hàm số y = cot(3x).",
                options: [
                "y' = -3 / sin²(3x)",
                "y' = 3 / sin²(3x)",
                "y' = -1 / sin²(3x)",
                "y' = -3 / cos²(3x)"
                ],
                correct: 0,
                explanation: "Đạo hàm cot(u)' = -u' / sin²(u). Với u = 3x thì u' = 3. Vậy y' = -3 / sin²(3x)."
                },
                {
                text: "Câu 10: Tính đạo hàm của hàm số y = sin²(x).",
                options: [
                "y' = sin(2x)",
                "y' = 2.sin(x)",
                "y' = cos(2x)",
                "y' = -sin(2x)"
                ],
                correct: 0,
                explanation: "y' = 2.sin(x).(sin x)' = 2.sin(x).cos(x) = sin(2x)."
                },
                {
                text: "Câu 11: Cho hàm số f(x) = x.sin(x). Tính giá trị f'(π/2).",
                options: [
                "1",
                "0",
                "π/2",
                "-1"
                ],
                correct: 0,
                explanation: "f'(x) = sin(x) + x.cos(x). Tại x = π/2: f'(π/2) = sin(π/2) + (π/2).cos(π/2) = 1 + 0 = 1."
                },
                {
                text: "Câu 12: Tính đạo hàm của hàm số y = (2x² + 1)³.",
                options: [
                "y' = 12x.(2x² + 1)²",
                "y' = 3.(2x² + 1)²",
                "y' = 6x.(2x² + 1)²",
                "y' = 12x².(2x² + 1)²"
                ],
                correct: 0,
                explanation: "y' = 3.(2x² + 1)² . (2x² + 1)' = 3.(2x² + 1)² . 4x = 12x.(2x² + 1)²."
                },
                {
                text: "Câu 13: Cho hàm số y = x³ - 3x. Tính đạo hàm cấp hai y'' tại x = 2.",
                options: [
                "12",
                "6",
                "9",
                "0"
                ],
                correct: 0,
                explanation: "y' = 3x² - 3. y'' = 6x. Tại x = 2: y''(2) = 6.2 = 12."
                },
                {
                text: "Câu 14: Cho f(x) = cos³(x). Tính giá trị của f'(π/2).",
                options: [
                "0",
                "-3",
                "3",
                "1"
                ],
                correct: 0,
                explanation: "f'(x) = 3.cos²(x).(-sin x). Tại x = π/2, cos(π/2) = 0 nên f'(π/2) = 0."
                },
                {
                text: "Câu 15: Tính đạo hàm của hàm số y = 2 / x.",
                options: [
                "y' = -2 / x²",
                "y' = 2 / x²",
                "y' = -1 / x²",
                "y' = -2 / x"
                ],
                correct: 0,
                explanation: "Đạo hàm của 1/x là -1/x². Vậy (2/x)' = -2/x²."
                },
                {
                text: "Câu 16: Viết phương trình tiếp tuyến của y = x² tại điểm có hoành độ x = 2.",
                options: [
                "y = 4x - 4",
                "y = 4x + 4",
                "y = 2x - 4",
                "y = 4x"
                ],
                correct: 0,
                explanation: "y(2) = 4, y' = 2x => y'(2) = 4. PTTT: y = 4(x-2) + 4 = 4x - 4."
                },
                {
                text: "Câu 17: Cho f(x) = x³ - 3x². Tìm x để f'(x) < 0.",
                options: [
                "x thuộc (0; 2)",
                "x thuộc (0; 3)",
                "x thuộc [0; 2]",
                "x thuộc (-vô cùng; 0)"
                ],
                correct: 0,
                explanation: "f'(x) = 3x² - 6x. Giải 3x² - 6x < 0 <=> 3x(x - 2) < 0 <=> 0 < x < 2."
                },
                {
                text: "Câu 18: Giải phương trình f'(x) = 0 biết f(x) = sin(x) - cos(x).",
                options: [
                "x = -π/4 + k.π",
                "x = π/4 + k.π",
                "x = 3π/4 + k.π",
                "x = k.π"
                ],
                correct: 0,
                explanation: "f'(x) = cos(x) + sin(x). f'(x) = 0 <=> tan(x) = -1 <=> x = -π/4 + k.π."
                },
                {
                text: "Câu 19: Một vật rơi tự do có phương trình s(t) = 5t². Tính vận tốc của vật tại thời điểm t = 3.",
                options: [
                "30 m/s",
                "15 m/s",
                "45 m/s",
                "10 m/s"
                ],
                correct: 0,
                explanation: "v(t) = s'(t) = 10t. Tại t = 3: v(3) = 10.3 = 30 m/s."
                },
                {
                text: "Câu 20: Tìm hệ số góc k của tiếp tuyến đồ thị y = (2x - 1)/(x + 1) tại giao điểm với trục tung.",
                options: [
                "k = 3",
                "k = -3",
                "k = 1",
                "k = -1"
                ],
                correct: 0,
                explanation: "Giao trục tung => x = 0. y' = 3/(x+1)². Tại x = 0: y'(0) = 3/1² = 3."
                },
                {
                text: "Câu 21: Cho hàm số y = căn(x). Chứng minh hệ thức 2y.y'' + (y')² là đúng hay sai?",
                options: [
                "Biểu thức bằng -1/(2x)",
                "Biểu thức bằng 0",
                "Biểu thức bằng 1",
                "Biểu thức bằng -1/x"
                ],
                correct: 0,
                explanation: "y' = 1/(2.căn x), y'' = -1/(4x.căn x). Thay vào ta được kết quả rút gọn."
                },
                {
                text: "Câu 22: Tính đạo hàm cấp hai của hàm số y = sin(x) tại x = π.",
                options: [
                "0",
                "1",
                "-1",
                "2"
                ],
                correct: 0,
                explanation: "y' = cos(x), y'' = -sin(x). Tại x = π: y''(π) = -sin(π) = 0."
                },
                {
                text: "Câu 23: Cho hàm số y = x⁴ - 4x². Tìm các điểm mà tại đó tiếp tuyến song song với trục hoành.",
                options: [
                "x = 0 và x = ±căn(2)",
                "x = 0 và x = 2",
                "x = ±2",
                "x = 0"
                ],
                correct: 0,
                explanation: "Tiếp tuyến // trục hoành => y' = 0. 4x³ - 8x = 0 <=> 4x(x² - 2) = 0 <=> x = 0 hoặc x = ±căn(2)."
                },
                {
                text: "Câu 24: Cho hàm số f(x) = tan(x). Tính f''(0).",
                options: [
                "0",
                "1",
                "2",
                "-1"
                ],
                correct: 0,
                explanation: "f'(x) = 1/cos²(x). f''(x) = 2.sin(x)/cos³(x). Tại x = 0, sin(0) = 0 nên f''(0) = 0."
                },
                {
                text: "Câu 25: Chuyển động của một hạt được cho bởi s(t) = cos(π.t). Tính gia tốc của hạt tại t = 1.",
                options: [
                "π²",
                "-π²",
                "0",
                "1"
                ],
                correct: 0,
                explanation: "v(t) = -π.sin(π.t). a(t) = -π².cos(π.t). Tại t = 1: a(1) = -π².cos(π) = -π².(-1) = π²."
                }
                ],
        };

        let currentIdx = 0;
        let userAnswers = new Array(QUIZ_DATA.questions.length).fill(null);
        let isSubmitted = false;
        let secondsLeft = QUIZ_DATA.time * 60;
        let timerInterval;

        const qText = document.getElementById('q-text');
        const optionsList = document.getElementById('options-list');
        const navGrid = document.getElementById('nav-grid');
        const timerDisplay = document.getElementById('timer');

        function init() {
            navGrid.innerHTML = '';
            QUIZ_DATA.questions.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = i + 1;
                item.id = `nav-${i}`;
                item.onclick = () => { currentIdx = i; renderQuestion(); };
                navGrid.appendChild(item);
            });
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const data = QUIZ_DATA.questions[currentIdx];
            document.getElementById('q-current').innerText = currentIdx + 1;
            qText.innerText = data.text; // Sửa lỗi gọi thuộc tính .q thành .text
            
            optionsList.innerHTML = '';
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (userAnswers[currentIdx] === i) div.classList.add('selected');
                
                if (isSubmitted) {
                    div.classList.add('disabled');
                    if (i === data.correct) div.classList.add('correct');
                    if (userAnswers[currentIdx] === i && i !== data.correct) div.classList.add('wrong');
                } else {
                    div.onclick = () => selectOption(i);
                }

                div.innerHTML = `<span style="font-weight:bold; margin-right:10px">${String.fromCharCode(65+i)}.</span> <span>${opt}</span>`;
                optionsList.appendChild(div);
            });

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === QUIZ_DATA.questions.length - 1;

            const expBox = document.getElementById('explanation-box');
            if (isSubmitted) {
                expBox.classList.remove('hidden');
                document.getElementById('explanation-text').innerText = data.explanation; // Sửa lỗi thuộc tính .explain thành .explanation
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            document.getElementById(`nav-${currentIdx}`).classList.add('done');
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isSubmitted) return;
                secondsLeft--;
                const m = Math.floor(secondsLeft / 60);
                const s = secondsLeft % 60;
                timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
            }, 1000);
        }

        function finishQuiz() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            let score = 0;
            userAnswers.forEach((ans, i) => {
                const navItem = document.getElementById(`nav-${i}`);
                if (ans === QUIZ_DATA.questions[i].correct) {
                    score++;
                    navItem.classList.add('correct');
                } else {
                    navItem.classList.add('wrong');
                }
            });

            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('score-percent').innerText = Math.round((score/QUIZ_DATA.questions.length)*100) + "%";
            renderQuestion();
        }

        document.getElementById('next-btn').onclick = () => { if (currentIdx < QUIZ_DATA.questions.length - 1) { currentIdx++; renderQuestion(); } };
        document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) { currentIdx--; renderQuestion(); } };
        document.getElementById('submit-btn').onclick = () => { if (confirm("Bạn có chắc chắn muốn nộp bài?")) finishQuiz(); };

        init();
    </script>
</body>
</html>
