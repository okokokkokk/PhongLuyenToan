<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng luyện đề trắc nghiệm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="website icon" type="jpg" href="../../logo.jpg">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 10px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .timer-container {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .q-badge {
            background: rgba(248, 94, 56, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        #q-text { margin: 15px 0; font-size: 1.15rem; font-weight: 500; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option:hover:not(.disabled) { background: rgba(0, 94, 255, 0.07); border-color: var(--text-secondary); }
        .option.selected { border-color: var(--primary); background: rgba(0, 157, 255, 0.1); }
        .option.correct { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .option.wrong { border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .option.disabled { cursor: default; }

        .controls { display: flex; justify-content: space-between; margin-top: 20px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; justify-content: center; margin-top: 15px; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 100%; justify-content: center; margin-top: 10px; }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .nav-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-item.active { border-color: var(--primary); color: var(--primary); outline: 2px solid rgba(56,189,248,0.2); }
        .nav-item.done { background: #334155; color: #fff; }
        .nav-item.correct { background: var(--success); color: #fff; border-color: var(--success); }
        .nav-item.wrong { background: var(--error); color: #fff; border-color: var(--error); }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .hidden { display: none; }
        
        .score-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
        }
        #score-percent { text-align: center; color: var(--text-secondary); font-weight: bold; }
        /* Màu xanh dương đậm khi chọn */
        .option.selected {
            background-color: #2aa2d6 !important; 
            border-color: #1d4ed8 !important;
            color: #ffffff !important; /* Chữ trắng cho nổi bật */
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 5px; }
            
            header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                padding: 10px;
            }

            .main-layout {
                grid-template-columns: 1fr; /* Chuyển thành 1 cột */
            }

            .quiz-section { order: 1; }
            .sidebar { order: 2; }

            .timer-container { font-size: 1.2rem; width: 100%; justify-content: center; display: flex; }
            
            .q-text { font-size: 1.05rem; }
            .option { padding: 12px; font-size: 0.95rem; }
            
            .controls button {
                flex: 1;
                padding: 15px 10px; /* Tăng diện tích chạm */
                font-size: 0.9rem;
            }

            .nav-grid {
                grid-template-columns: repeat(5, 1fr); /* Hiển thị 5 ô trên 1 hàng cho gọn */
            }
        }
    </style>
</head>
<body>
    <!-- Nút quay lại -->
    <div style="padding: 10px; max-width: 1100px; margin: 0 auto;">
        <button onclick="window.history.back()" class="btn btn-secondary" style="width: auto; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Quay lại
        </button>
    </div>
    <div class="container">
        <header>
            <div class="header-info">
                <h1 id="quiz-title">Đạo hàm - Mã đề 06</h1>
                <p id="quiz-subtitle">Thời gian: <span id="limit-time">45</span> phút</p>
            </div>
            <div class="timer-container">
                <i class="fas fa-clock"></i>
                <span id="timer">45:00</span>
            </div>
        </header>

        <div class="main-layout">
            <div class="quiz-section">
                <div id="question-card" class="card">
                    <div class="card-header">
                        <span class="q-badge">Câu <span id="q-current">1</span>/25</span>
                    </div>
                    <h2 id="q-text">Đang tải...</h2>
                    <div id="options-list" class="options-list"></div>
                    <div id="explanation-box" class="explanation-box hidden">
                        <strong><i class="fas fa-lightbulb"></i> Giải thích:</strong>
                        <p id="explanation-text" style="margin-top:5px; color: var(--text-secondary);"></p>
                    </div>
                </div>

                <div class="controls">
                    <button id="prev-btn" class="btn btn-secondary"><i class="fas fa-chevron-left"></i> Câu trước</button>
                    <button id="next-btn" class="btn btn-secondary">Câu sau <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="card">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">Tiến trình làm bài</h3>
                    <div id="nav-grid" class="nav-grid"></div>
                    <button id="submit-btn" class="btn btn-primary">NỘP BÀI</button>
                </div>

                <div id="result-card" class="card hidden">
                    <h3 style="text-align: center;">KẾT QUẢ</h3>
                    <div class="score-display">
                        <span id="score-val">0</span>/<span id="total-val">25</span>
                    </div>
                    <p id="score-percent">0%</p>
                    <button onclick="location.reload()" class="btn btn-outline">Làm lại bài thi</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const QUIZ_DATA = {
            title: "Đề Ôn Tập Đạo Hàm - Mã đề 06",
            time: 45,
            questions: [
            {
                text: "Câu 1: Cho hàm số y = x^4 - 3x^2 + 2. Tính đạo hàm y'.",
                options: [
                "y' = 4x^3 - 6x",
                "y' = 4x^3 - 6x + 2",
                "y' = 4x^3 - 3x",
                "y' = x^3 - 6x"
                ],
                correct: 0,
                explanation: "Áp dụng công thức đạo hàm hàm đa thức (x^n)' = n.x^(n-1)."
            },
            {
                text: "Câu 2: Đạo hàm của hàm số y = (2x + 1)^5 là:",
                options: [
                "y' = 5(2x + 1)^4",
                "y' = 10(2x + 1)^4",
                "y' = 2(2x + 1)^5",
                "y' = 10(2x + 1)^5"
                ],
                correct: 1,
                explanation: "Đạo hàm hàm hợp u^n: (u^n)' = n.u^(n-1).u'. Ở đây u = 2x + 1 nên u' = 2."
            },
            {
                text: "Câu 3: Đạo hàm của hàm số y = sin(3x) là:",
                options: [
                "y' = cos(3x)",
                "y' = -3.cos(3x)",
                "y' = 3.cos(3x)",
                "y' = 3.sin(3x)"
                ],
                correct: 2,
                explanation: "(sin u)' = u'.cos u. Với u = 3x thì u' = 3."
            },
            {
                text: "Câu 4: Tính đạo hàm của hàm số y = căn(x^2 + 1).",
                options: [
                "y' = 1 / [2.căn(x^2 + 1)]",
                "y' = x / căn(x^2 + 1)",
                "y' = 2x / căn(x^2 + 1)",
                "y' = x^2 / căn(x^2 + 1)"
                ],
                correct: 1,
                explanation: "(căn u)' = u' / (2.căn u). Ở đây u' = 2x, rút gọn cho 2 ta được x / căn(x^2 + 1)."
            },
            {
                text: "Câu 5: Đạo hàm của hàm số y = (x - 1) / (x + 1) là:",
                options: [
                "y' = 2 / (x + 1)^2",
                "y' = -2 / (x + 1)^2",
                "y' = 0",
                "y' = 1 / (x + 1)^2"
                ],
                correct: 0,
                explanation: "Dùng quy tắc (u/v)' hoặc công thức nhanh (ad-bc)/(cx+d)^2: (1*1 - (-1)*1)/(x+1)^2 = 2/(x+1)^2."
            },
            {
                text: "Câu 6: Cho hàm số y = tan x. Tính y'(π/4).",
                options: [
                "1",
                "2",
                "0",
                "căn 2"
                ],
                correct: 1,
                explanation: "y' = 1/cos^2(x). Tại x = π/4, cos(x) = căn(2)/2, bình phương là 1/2. Do đó y' = 1/(1/2) = 2."
            },
            {
                text: "Câu 7: Đạo hàm của hàm số y = e^(2x) là:",
                options: [
                "y' = e^(2x)",
                "y' = 2.e^(2x)",
                "y' = 2x.e^(2x-1)",
                "y' = e^x"
                ],
                correct: 1,
                explanation: "(e^u)' = u'.e^u. Với u = 2x thì u' = 2."
            },
            {
                text: "Câu 8: Cho hàm số f(x) = ln(x). Tính f'(2).",
                options: [
                "1/2",
                "1",
                "ln 2",
                "0"
                ],
                correct: 0,
                explanation: "f'(x) = 1/x. Thay x = 2 ta được 1/2."
            },
            {
                text: "Câu 9: Phương trình tiếp tuyến của đồ thị hàm số y = x^2 tại điểm M(1; 1) là:",
                options: [
                "y = 2x - 1",
                "y = 2x + 1",
                "y = x + 1",
                "y = 2x"
                ],
                correct: 0,
                explanation: "y' = 2x. Tại x = 1, y' = 2. PTTT: y - 1 = 2(x - 1) => y = 2x - 1."
            },
            {
                text: "Câu 10: Đạo hàm của hàm số y = cos(x^2) là:",
                options: [
                "y' = -sin(x^2)",
                "y' = -2x.sin(x^2)",
                "y' = 2x.cos(x^2)",
                "y' = -2x.cos(x^2)"
                ],
                correct: 1,
                explanation: "(cos u)' = -u'.sin u. Với u = x^2 thì u' = 2x."
            },
            {
                text: "Câu 11: Tính đạo hàm của y = 3^x.",
                options: [
                "y' = 3^x",
                "y' = x.3^(x-1)",
                "y' = 3^x . ln 3",
                "y' = 3^x / ln 3"
                ],
                correct: 2,
                explanation: "Công thức đạo hàm hàm mũ: (a^x)' = a^x . ln a."
            },
            {
                text: "Câu 12: Đạo hàm của y = x.ln x là:",
                options: [
                "y' = ln x",
                "y' = 1",
                "y' = ln x + 1",
                "y' = ln x - 1"
                ],
                correct: 2,
                explanation: "Dùng quy tắc (uv)' = u'v + uv'. y' = 1.ln x + x.(1/x) = ln x + 1."
            },
            {
                text: "Câu 13: Cho f(x) = sin^2(x). Tính f'(x).",
                options: [
                "f'(x) = 2.sin x",
                "f'(x) = sin(2x)",
                "f'(x) = cos(2x)",
                "f'(x) = 2.cos x"
                ],
                correct: 1,
                explanation: "f'(x) = 2.sin x. (sin x)' = 2.sin x . cos x = sin(2x)."
            },
            {
                text: "Câu 14: Đạo hàm của hàm số y = log_2(x) là:",
                options: [
                "y' = 1 / (x.ln 2)",
                "y' = 1 / x",
                "y' = ln 2 / x",
                "y' = 1 / (x.log 2)"
                ],
                correct: 0,
                explanation: "Công thức: (log_a x)' = 1 / (x.ln a)."
            },
            {
                text: "Câu 15: Hệ số góc của tiếp tuyến của đồ thị y = 1/x tại x = 2 là:",
                options: [
                "1/2",
                "-1/4",
                "1/4",
                "-1/2"
                ],
                correct: 1,
                explanation: "y' = -1/x^2. Tại x = 2, y' = -1/2^2 = -1/4."
            },
            {
                text: "Câu 16: Đạo hàm của hàm số y = căn(3x + 1) là:",
                options: [
                "y' = 3 / [2.căn(3x + 1)]",
                "y' = 1 / [2.căn(3x + 1)]",
                "y' = 3.căn(3x + 1)",
                "y' = 3 / căn(3x + 1)"
                ],
                correct: 0,
                explanation: "(căn u)' = u' / (2.căn u) với u = 3x + 1."
            },
            {
                text: "Câu 17: Cho hàm số y = f(x) có f'(x) = x^2 - 1. Hàm số đồng biến trên khoảng nào?",
                options: [
                "(-1; 1)",
                "(1; +vô cùng)",
                "(-vô cùng; 1)",
                "R"
                ],
                correct: 1,
                explanation: "Đồng biến khi f'(x) > 0 <=> x^2 - 1 > 0 <=> x > 1 hoặc x < -1."
            },
            {
                text: "Câu 18: Đạo hàm của hàm số y = cot x là:",
                options: [
                "y' = 1 / sin^2(x)",
                "y' = -1 / sin^2(x)",
                "y' = 1 / cos^2(x)",
                "y' = -tan x"
                ],
                correct: 1,
                explanation: "Công thức đạo hàm lượng giác cơ bản."
            },
            {
                text: "Câu 19: Tính đạo hàm của y = (x^2 + x)^3.",
                options: [
                "y' = 3(x^2 + x)^2",
                "y' = 3(x^2 + x)^2 . (2x + 1)",
                "y' = (2x + 1)^3",
                "y' = 6x(x^2 + x)^2"
                ],
                correct: 1,
                explanation: "Đạo hàm hàm hợp u^n."
            },
            {
                text: "Câu 20: Cho hàm số f(x) = x^3 - 3x. Giải phương trình f'(x) = 0.",
                options: [
                "x = 1",
                "x = 0",
                "x = ±1",
                "x = ±căn 3"
                ],
                correct: 2,
                explanation: "f'(x) = 3x^2 - 3. Cho 3x^2 - 3 = 0 => x^2 = 1 => x = ±1."
            },
            {
                text: "Câu 21: Đạo hàm của hàm số y = 1 / (2x - 1) là:",
                options: [
                "y' = 2 / (2x - 1)^2",
                "y' = -2 / (2x - 1)^2",
                "y' = -1 / (2x - 1)^2",
                "y' = 1 / (2x - 1)^2"
                ],
                correct: 1,
                explanation: "Dùng công thức (1/u)' = -u'/u^2."
            },
            {
                text: "Câu 22: Viết phương trình tiếp tuyến của y = x^3 - 3x + 2 tại điểm có hoành độ x = 0.",
                options: [
                "y = -3x + 2",
                "y = 3x + 2",
                "y = -3x - 2",
                "y = x + 2"
                ],
                correct: 0,
                explanation: "y' = 3x^2 - 3. Tại x = 0, y = 2 và y' = -3. PTTT: y - 2 = -3(x - 0)."
            },
            {
                text: "Câu 23: Đạo hàm của y = sin x + cos x là:",
                options: [
                "y' = cos x - sin x",
                "y' = cos x + sin x",
                "y' = -cos x + sin x",
                "y' = 0"
                ],
                correct: 0,
                explanation: "(sin x)' = cos x; (cos x)' = -sin x."
            },
            {
                text: "Câu 24: Cho f(x) = x^2. Tính đạo hàm của f(sin x).",
                options: [
                "2.sin x",
                "sin(2x)",
                "2.cos x",
                "cos(2x)"
                ],
                correct: 1,
                explanation: "Đây là hàm y = (sin x)^2. y' = 2.sin x.cos x = sin(2x)."
            },
            {
                text: "Câu 25: Tính đạo hàm của hàm số y = ln(2x + 1).",
                options: [
                "y' = 1 / (2x + 1)",
                "y' = 2 / (2x + 1)",
                "y' = 2x / (2x + 1)",
                "y' = 2"
                ],
                correct: 1,
                explanation: "(ln u)' = u'/u. Ở đây u = 2x + 1 nên u' = 2."
            }
            ]
        };

        let currentIdx = 0;
        let userAnswers = new Array(QUIZ_DATA.questions.length).fill(null);
        let isSubmitted = false;
        let secondsLeft = QUIZ_DATA.time * 60;
        let timerInterval;

        const qText = document.getElementById('q-text');
        const optionsList = document.getElementById('options-list');
        const navGrid = document.getElementById('nav-grid');
        const timerDisplay = document.getElementById('timer');

        function init() {
            navGrid.innerHTML = '';
            QUIZ_DATA.questions.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = i + 1;
                item.id = `nav-${i}`;
                item.onclick = () => { currentIdx = i; renderQuestion(); };
                navGrid.appendChild(item);
            });
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const data = QUIZ_DATA.questions[currentIdx];
            document.getElementById('q-current').innerText = currentIdx + 1;
            qText.innerText = data.text; // Sửa lỗi gọi thuộc tính .q thành .text
            
            optionsList.innerHTML = '';
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (userAnswers[currentIdx] === i) div.classList.add('selected');
                
                if (isSubmitted) {
                    div.classList.add('disabled');
                    if (i === data.correct) div.classList.add('correct');
                    if (userAnswers[currentIdx] === i && i !== data.correct) div.classList.add('wrong');
                } else {
                    div.onclick = () => selectOption(i);
                }

                div.innerHTML = `<span style="font-weight:bold; margin-right:10px">${String.fromCharCode(65+i)}.</span> <span>${opt}</span>`;
                optionsList.appendChild(div);
            });

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === QUIZ_DATA.questions.length - 1;

            const expBox = document.getElementById('explanation-box');
            if (isSubmitted) {
                expBox.classList.remove('hidden');
                document.getElementById('explanation-text').innerText = data.explanation; // Sửa lỗi thuộc tính .explain thành .explanation
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            document.getElementById(`nav-${currentIdx}`).classList.add('done');
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isSubmitted) return;
                secondsLeft--;
                const m = Math.floor(secondsLeft / 60);
                const s = secondsLeft % 60;
                timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
            }, 1000);
        }

        function finishQuiz() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            let score = 0;
            userAnswers.forEach((ans, i) => {
                const navItem = document.getElementById(`nav-${i}`);
                if (ans === QUIZ_DATA.questions[i].correct) {
                    score++;
                    navItem.classList.add('correct');
                } else {
                    navItem.classList.add('wrong');
                }
            });

            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('score-percent').innerText = Math.round((score/QUIZ_DATA.questions.length)*100) + "%";
            renderQuestion();
        }

        document.getElementById('next-btn').onclick = () => { if (currentIdx < QUIZ_DATA.questions.length - 1) { currentIdx++; renderQuestion(); } };
        document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) { currentIdx--; renderQuestion(); } };
        document.getElementById('submit-btn').onclick = () => { if (confirm("Bạn có chắc chắn muốn nộp bài?")) finishQuiz(); };

        init();
    </script>
</body>
</html>
