<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng luyện đề trắc nghiệm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="website icon" type="jpg" href="../../logo.jpg">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 10px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .timer-container {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .q-badge {
            background: rgba(248, 94, 56, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        #q-text { margin: 15px 0; font-size: 1.15rem; font-weight: 500; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option:hover:not(.disabled) { background: rgba(0, 94, 255, 0.07); border-color: var(--text-secondary); }
        .option.selected { border-color: var(--primary); background: rgba(0, 157, 255, 0.1); }
        .option.correct { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .option.wrong { border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .option.disabled { cursor: default; }

        .controls { display: flex; justify-content: space-between; margin-top: 20px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; justify-content: center; margin-top: 15px; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 100%; justify-content: center; margin-top: 10px; }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .nav-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-item.active { border-color: var(--primary); color: var(--primary); outline: 2px solid rgba(56,189,248,0.2); }
        .nav-item.done { background: #334155; color: #fff; }
        .nav-item.correct { background: var(--success); color: #fff; border-color: var(--success); }
        .nav-item.wrong { background: var(--error); color: #fff; border-color: var(--error); }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .hidden { display: none; }
        
        .score-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
        }
        #score-percent { text-align: center; color: var(--text-secondary); font-weight: bold; }
        /* Màu xanh dương đậm khi chọn */
        .option.selected {
            background-color: #2aa2d6 !important; 
            border-color: #1d4ed8 !important;
            color: #ffffff !important; /* Chữ trắng cho nổi bật */
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 5px; }
            
            header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                padding: 10px;
            }

            .main-layout {
                grid-template-columns: 1fr; /* Chuyển thành 1 cột */
            }

            .quiz-section { order: 1; }
            .sidebar { order: 2; }

            .timer-container { font-size: 1.2rem; width: 100%; justify-content: center; display: flex; }
            
            .q-text { font-size: 1.05rem; }
            .option { padding: 12px; font-size: 0.95rem; }
            
            .controls button {
                flex: 1;
                padding: 15px 10px; /* Tăng diện tích chạm */
                font-size: 0.9rem;
            }

            .nav-grid {
                grid-template-columns: repeat(5, 1fr); /* Hiển thị 5 ô trên 1 hàng cho gọn */
            }
        }
    </style>
</head>
<body>
    <!-- Nút quay lại -->
    <div style="padding: 10px; max-width: 1100px; margin: 0 auto;">
        <button onclick="window.history.back()" class="btn btn-secondary" style="width: auto; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Quay lại
        </button>
    </div>
    <div class="container">
        <header>
            <div class="header-info">
                <h1 id="quiz-title">Đạo hàm - Mã đề 03</h1>
                <p id="quiz-subtitle">Thời gian: <span id="limit-time">45</span> phút</p>
            </div>
            <div class="timer-container">
                <i class="fas fa-clock"></i>
                <span id="timer">45:00</span>
            </div>
        </header>

        <div class="main-layout">
            <div class="quiz-section">
                <div id="question-card" class="card">
                    <div class="card-header">
                        <span class="q-badge">Câu <span id="q-current">1</span>/25</span>
                    </div>
                    <h2 id="q-text">Đang tải...</h2>
                    <div id="options-list" class="options-list"></div>
                    <div id="explanation-box" class="explanation-box hidden">
                        <strong><i class="fas fa-lightbulb"></i> Giải thích:</strong>
                        <p id="explanation-text" style="margin-top:5px; color: var(--text-secondary);"></p>
                    </div>
                </div>

                <div class="controls">
                    <button id="prev-btn" class="btn btn-secondary"><i class="fas fa-chevron-left"></i> Câu trước</button>
                    <button id="next-btn" class="btn btn-secondary">Câu sau <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="card">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">Tiến trình làm bài</h3>
                    <div id="nav-grid" class="nav-grid"></div>
                    <button id="submit-btn" class="btn btn-primary">NỘP BÀI</button>
                </div>

                <div id="result-card" class="card hidden">
                    <h3 style="text-align: center;">KẾT QUẢ</h3>
                    <div class="score-display">
                        <span id="score-val">0</span>/<span id="total-val">25</span>
                    </div>
                    <p id="score-percent">0%</p>
                    <button onclick="location.reload()" class="btn btn-outline">Làm lại bài thi</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const QUIZ_DATA = {
            title: "Đề Ôn Tập Đạo Hàm - Mã đề 03",
            time: 45,
            questions: [
                {
                text: "Câu 1 (Nhận biết): Tính đạo hàm của hàm số y = x⁵.",
                options: [
                "y' = 5x⁴",
                "y' = 5x",
                "y' = x⁴",
                "y' = 4x⁵"
                ],
                correct: 0,
                explanation: "Áp dụng công thức (xⁿ)' = n.xⁿ⁻¹. Ta có (x⁵)' = 5x⁴."
                },
                {
                text: "Câu 2 (Nhận biết): Đạo hàm của hàm số y = sin(x) là:",
                options: [
                "y' = cos(x)",
                "y' = -cos(x)",
                "y' = sin(x)",
                "y' = -sin(x)"
                ],
                correct: 0,
                explanation: "Theo bảng đạo hàm các hàm số lượng giác cơ bản, (sin x)' = cos x."
                },
                {
                text: "Câu 3 (Nhận biết): Tính đạo hàm của hàm số y = căn(x) (với x > 0).",
                options: [
                "y' = 1 / (2.căn x)",
                "y' = 1 / căn x",
                "y' = 2.căn x",
                "y' = x / 2"
                ],
                correct: 0,
                explanation: "Công thức đạo hàm căn thức cơ bản là (căn x)' = 1 / (2.căn x)."
                },
                {
                text: "Câu 4 (Nhận biết): Cho hàm số y = 3x + 1. Tính y'.",
                options: [
                "y' = 3",
                "y' = 3x",
                "y' = 1",
                "y' = 0"
                ],
                correct: 0,
                explanation: "Đạo hàm của ax + b là a. Ở đây a = 3."
                },
                {
                text: "Câu 5 (Nhận biết): Đạo hàm của hàm số y = tan(x) là:",
                options: [
                "y' = 1 / cos²(x)",
                "y' = 1 / sin²(x)",
                "y' = -1 / cos²(x)",
                "y' = -1 / sin²(x)"
                ],
                correct: 0,
                explanation: "Theo công thức đạo hàm lượng giác: (tan x)' = 1/cos²x = 1 + tan²x."
                },
                {
                text: "Câu 6 (Thông hiểu): Tính đạo hàm của hàm số y = (x² + 1).(x - 2).",
                options: [
                "y' = 3x² - 4x + 1",
                "y' = 2x",
                "y' = 3x² + 1",
                "y' = 3x² - 4x"
                ],
                correct: 0,
                explanation: "Khai triển y = x³ - 2x² + x - 2. Đạo hàm y' = 3x² - 4x + 1."
                },
                {
                text: "Câu 7 (Thông hiểu): Tính đạo hàm của hàm số y = căn(2x + 1).",
                options: [
                "y' = 1 / căn(2x + 1)",
                "y' = 2 / căn(2x + 1)",
                "y' = 1 / [2.căn(2x + 1)]",
                "y' = x / căn(2x + 1)"
                ],
                correct: 0,
                explanation: "Hàm hợp (căn u)' = u'/(2.căn u). Với u = 2x+1 thì u' = 2. Vậy y' = 2/[2.căn(2x+1)] = 1/căn(2x+1)."
                },
                {
                text: "Câu 8 (Thông hiểu): Cho hàm số f(x) = sin(2x). Tính f'(π/4).",
                options: [
                "0",
                "2",
                "1",
                "-2"
                ],
                correct: 0,
                explanation: "f'(x) = 2.cos(2x). Thay x = π/4 ta được 2.cos(π/2) = 2.0 = 0."
                },
                {
                text: "Câu 9 (Thông hiểu): Tính đạo hàm của hàm số y = (2x - 1) / (x + 2).",
                options: [
                "y' = 5 / (x + 2)²",
                "y' = 3 / (x + 2)²",
                "y' = -5 / (x + 2)²",
                "y' = 5 / (x + 2)"
                ],
                correct: 0,
                explanation: "Công thức nhanh: (2.2 - (-1).1) / (x + 2)² = 5 / (x + 2)²."
                },
                {
                text: "Câu 10 (Thông hiểu): Tính đạo hàm cấp hai của hàm số y = x³ - 2x.",
                options: [
                "y'' = 6x",
                "y'' = 3x² - 2",
                "y'' = 6",
                "y'' = 3x"
                ],
                correct: 0,
                explanation: "y' = 3x² - 2. Đạo hàm tiếp ta được y'' = 6x."
                },
                {
                text: "Câu 11 (Vận dụng thấp): Một chất điểm chuyển động theo phương trình s(t) = t² + 3t + 1. Tính vận tốc tại t = 2.",
                options: [
                "7",
                "5",
                "8",
                "4"
                ],
                correct: 0,
                explanation: "v(t) = s'(t) = 2t + 3. Tại t = 2, v = 2.2 + 3 = 7."
                },
                {
                text: "Câu 12 (Vận dụng thấp): Hệ số góc của tiếp tuyến đồ thị y = x² - x tại điểm có hoành độ x = 1 là:",
                options: [
                "1",
                "2",
                "0",
                "-1"
                ],
                correct: 0,
                explanation: "k = y'(1). Ta có y' = 2x - 1. Vậy k = 2.1 - 1 = 1."
                },
                {
                text: "Câu 13 (Vận dụng thấp): Giải phương trình f'(x) = 0 biết f(x) = x³/3 - x² - 3x.",
                options: [
                "x = 3 hoặc x = -1",
                "x = 1 hoặc x = -3",
                "x = 0",
                "x = 3"
                ],
                correct: 0,
                explanation: "f'(x) = x² - 2x - 3. Cho x² - 2x - 3 = 0 ta được x = 3 hoặc x = -1."
                },
                {
                text: "Câu 14 (Vận dụng thấp): Đạo hàm của hàm số y = sin²(x) là:",
                options: [
                "y' = sin(2x)",
                "y' = 2.sin(x)",
                "y' = cos²(x)",
                "y' = -sin(2x)"
                ],
                correct: 0,
                explanation: "y' = 2.sin(x).(sin x)' = 2.sin(x).cos(x) = sin(2x)."
                },
                {
                text: "Câu 15 (Vận dụng thấp): Tính đạo hàm của hàm số y = căn(x² + 1) tại x = 0.",
                options: [
                "0",
                "1",
                "1/2",
                "2"
                ],
                correct: 0,
                explanation: "y' = x / căn(x² + 1). Tại x = 0, y'(0) = 0/1 = 0."
                },
                {
                text: "Câu 16 (Vận dụng trung bình): Viết phương trình tiếp tuyến của (C): y = x³ - 3x + 2, biết tiếp tuyến song song với đường thẳng y = 9x + 1.",
                options: [
                "y = 9x - 14 hoặc y = 9x + 18",
                "y = 9x - 14",
                "y = 9x + 18",
                "y = 9x + 2"
                ],
                correct: 0,
                explanation: "k = y' = 3x² - 3. Cho 3x² - 3 = 9 <=> x = ±2. Với x=2, y=4 => y = 9x-14. Với x=-2, y=0 => y = 9x+18."
                },
                {
                text: "Câu 17 (Vận dụng trung bình): Cho hàm số y = căn(2x - x²). Khẳng định nào sau đây đúng?",
                options: [
                "y³ . y'' + 1 = 0",
                "y . y'' + 1 = 0",
                "y³ . y'' - 1 = 0",
                "y'' = y"
                ],
                correct: 0,
                explanation: "y' = (1-x)/y. y'' = [-1.y - (1-x).y'] / y² = [-y - (1-x)²/y] / y² = -(y² + (1-x)²)/y³ = -1/y³. Vậy y³.y'' + 1 = 0."
                },
                {
                text: "Câu 18 (Vận dụng trung bình): Tìm m để hàm số y = x³/3 - mx² + (2m - 1)x + 1 có đạo hàm luôn dương với mọi x thuộc R.",
                options: [
                "Không có giá trị m nào",
                "m = 1",
                "m > 1",
                "m < 1"
                ],
                correct: 1,
                explanation: "y' = x² - 2mx + (2m-1). Để y' > 0 với mọi x thì Delta' = m² - (2m-1) < 0 <=> (m-1)² < 0. Điều này chỉ xảy ra khi m=1 (y'=0 tại 1 điểm, còn lại dương)."

                "y' = sin(x).cos(cos x)",

                correct: 0,
                explanation: "y' = cos(cos x) . (cos x)' = cos(cos x) . (-sin x)."
                },

                options: [
                "Không tồn tại thời điểm đó",
                "0",
                "6",
                "-6"
                ],
                correct: 0,
                explanation: "v(t) = 3t² - 6t + 9. Delta' = 9 - 27 < 0. Phương trình v(t) = 0 vô nghiệm. Vậy không tồn tại thời điểm vận tốc triệt tiêu."
                },
                {
                text: "Câu 21 (Vận dụng trung bình): Viết phương trình tiếp tuyến của y = (2x + 1)/(x - 1) tại điểm có hoành độ x = 0.",

                "y = -3x + 1",
                "y = 3x - 1",

                ],
                correct: 0,

                text: "Câu 22 (Vận dụng trung bình): Cho f(x) = cos²(x). Tính giá trị của f''(π/4).",

                "-2",
                "0",
                "2",
                "-1"
                ],
                correct: 0,

                text: "Câu 23 (Vận dụng trung bình): Tính đạo hàm của hàm số y = căn(x + căn x).",

                "y' = 1 / [2.căn(x + căn x)]",

                ],
                correct: 3,
                explanation: "A là dạng chưa rút gọn, C là dạng đã rút gọn mẫu số. Cả hai đều biểu diễn đúng đạo hàm."
                },
                {
                text: "Câu 24 (Vận dụng trung bình): Tìm hệ số góc k của tiếp tuyến đồ thị y = tan(x) tại điểm có hoành độ x = π/3.",
                options: [
                "k = 4",
                "k = 2",
                "k = 1/4",
                "k = 1"
                ],
                correct: 0,
                explanation: "y' = 1/cos²x. Tại x=π/3, cos(π/3) = 1/2 => cos²x = 1/4. Vậy k = 1 / (1/4) = 4."
                },
                {
                text: "Câu 25 (Vận dụng trung bình): Cho hàm số y = x.sin(x). Hệ thức nào sau đây đúng?",
                options: [
                "x.y - 2(y' - sin x) + x.y'' = 0",
                "y'' + y = 0",
                "y'' + y = 2.cos x",
                "Cả A và C đều đúng"
                ],
                correct: 3,
                explanation: "y' = sin x + x.cos x. y'' = cos x + cos x - x.sin x = 2.cos x - y. Do đó y'' + y = 2.cos x. Thay vào A cũng thỏa mãn."
                }
                ],
        };

        let currentIdx = 0;
        let userAnswers = new Array(QUIZ_DATA.questions.length).fill(null);
        let isSubmitted = false;
        let secondsLeft = QUIZ_DATA.time * 60;
        let timerInterval;

        const qText = document.getElementById('q-text');
        const optionsList = document.getElementById('options-list');
        const navGrid = document.getElementById('nav-grid');
        const timerDisplay = document.getElementById('timer');

        function init() {
            navGrid.innerHTML = '';
            QUIZ_DATA.questions.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = i + 1;
                item.id = `nav-${i}`;
                item.onclick = () => { currentIdx = i; renderQuestion(); };
                navGrid.appendChild(item);
            });
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const data = QUIZ_DATA.questions[currentIdx];
            document.getElementById('q-current').innerText = currentIdx + 1;
            qText.innerText = data.text; // Sửa lỗi gọi thuộc tính .q thành .text
            
            optionsList.innerHTML = '';
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (userAnswers[currentIdx] === i) div.classList.add('selected');
                
                if (isSubmitted) {
                    div.classList.add('disabled');
                    if (i === data.correct) div.classList.add('correct');
                    if (userAnswers[currentIdx] === i && i !== data.correct) div.classList.add('wrong');
                } else {
                    div.onclick = () => selectOption(i);
                }

                div.innerHTML = `<span style="font-weight:bold; margin-right:10px">${String.fromCharCode(65+i)}.</span> <span>${opt}</span>`;
                optionsList.appendChild(div);
            });

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === QUIZ_DATA.questions.length - 1;

            const expBox = document.getElementById('explanation-box');
            if (isSubmitted) {
                expBox.classList.remove('hidden');
                document.getElementById('explanation-text').innerText = data.explanation; // Sửa lỗi thuộc tính .explain thành .explanation
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            document.getElementById(`nav-${currentIdx}`).classList.add('done');
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isSubmitted) return;
                secondsLeft--;
                const m = Math.floor(secondsLeft / 60);
                const s = secondsLeft % 60;
                timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
            }, 1000);
        }

        function finishQuiz() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            let score = 0;
            userAnswers.forEach((ans, i) => {
                const navItem = document.getElementById(`nav-${i}`);
                if (ans === QUIZ_DATA.questions[i].correct) {
                    score++;
                    navItem.classList.add('correct');
                } else {
                    navItem.classList.add('wrong');
                }
            });

            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('score-percent').innerText = Math.round((score/QUIZ_DATA.questions.length)*100) + "%";
            renderQuestion();
        }

        document.getElementById('next-btn').onclick = () => { if (currentIdx < QUIZ_DATA.questions.length - 1) { currentIdx++; renderQuestion(); } };
        document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) { currentIdx--; renderQuestion(); } };
        document.getElementById('submit-btn').onclick = () => { if (confirm("Bạn có chắc chắn muốn nộp bài?")) finishQuiz(); };

        init();
    </script>
</body>
</html>
