<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng luyện đề trắc nghiệm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="website icon" type="jpg" href="../../logo.jpg">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 10px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .timer-container {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .q-badge {
            background: rgba(248, 94, 56, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        #q-text { margin: 15px 0; font-size: 1.15rem; font-weight: 500; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option:hover:not(.disabled) { background: rgba(0, 94, 255, 0.07); border-color: var(--text-secondary); }
        .option.selected { border-color: var(--primary); background: rgba(0, 157, 255, 0.1); }
        .option.correct { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .option.wrong { border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .option.disabled { cursor: default; }

        .controls { display: flex; justify-content: space-between; margin-top: 20px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; justify-content: center; margin-top: 15px; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 100%; justify-content: center; margin-top: 10px; }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .nav-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-item.active { border-color: var(--primary); color: var(--primary); outline: 2px solid rgba(56,189,248,0.2); }
        .nav-item.done { background: #334155; color: #fff; }
        .nav-item.correct { background: var(--success); color: #fff; border-color: var(--success); }
        .nav-item.wrong { background: var(--error); color: #fff; border-color: var(--error); }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .hidden { display: none; }
        
        .score-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
        }
        #score-percent { text-align: center; color: var(--text-secondary); font-weight: bold; }
        /* Màu xanh dương đậm khi chọn */
        .option.selected {
            background-color: #2aa2d6 !important; 
            border-color: #1d4ed8 !important;
            color: #ffffff !important; /* Chữ trắng cho nổi bật */
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 5px; }
            
            header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                padding: 10px;
            }

            .main-layout {
                grid-template-columns: 1fr; /* Chuyển thành 1 cột */
            }

            .quiz-section { order: 1; }
            .sidebar { order: 2; }

            .timer-container { font-size: 1.2rem; width: 100%; justify-content: center; display: flex; }
            
            .q-text { font-size: 1.05rem; }
            .option { padding: 12px; font-size: 0.95rem; }
            
            .controls button {
                flex: 1;
                padding: 15px 10px; /* Tăng diện tích chạm */
                font-size: 0.9rem;
            }

            .nav-grid {
                grid-template-columns: repeat(5, 1fr); /* Hiển thị 5 ô trên 1 hàng cho gọn */
            }
        }
    </style>
</head>
<body>
    <!-- Nút quay lại -->
    <div style="padding: 10px; max-width: 1100px; margin: 0 auto;">
        <button onclick="window.history.back()" class="btn btn-secondary" style="width: auto; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Quay lại
        </button>
    </div>
    <div class="container">
        <header>
            <div class="header-info">
                <h1 id="quiz-title">Đạo hàm - Mã đề 03</h1>
                <p id="quiz-subtitle">Thời gian: <span id="limit-time">45</span> phút</p>
            </div>
            <div class="timer-container">
                <i class="fas fa-clock"></i>
                <span id="timer">45:00</span>
            </div>
        </header>

        <div class="main-layout">
            <div class="quiz-section">
                <div id="question-card" class="card">
                    <div class="card-header">
                        <span class="q-badge">Câu <span id="q-current">1</span>/25</span>
                    </div>
                    <h2 id="q-text">Đang tải...</h2>
                    <div id="options-list" class="options-list"></div>
                    <div id="explanation-box" class="explanation-box hidden">
                        <strong><i class="fas fa-lightbulb"></i> Giải thích:</strong>
                        <p id="explanation-text" style="margin-top:5px; color: var(--text-secondary);"></p>
                    </div>
                </div>

                <div class="controls">
                    <button id="prev-btn" class="btn btn-secondary"><i class="fas fa-chevron-left"></i> Câu trước</button>
                    <button id="next-btn" class="btn btn-secondary">Câu sau <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="card">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">Tiến trình làm bài</h3>
                    <div id="nav-grid" class="nav-grid"></div>
                    <button id="submit-btn" class="btn btn-primary">NỘP BÀI</button>
                </div>

                <div id="result-card" class="card hidden">
                    <h3 style="text-align: center;">KẾT QUẢ</h3>
                    <div class="score-display">
                        <span id="score-val">0</span>/<span id="total-val">25</span>
                    </div>
                    <p id="score-percent">0%</p>
                    <button onclick="location.reload()" class="btn btn-outline">Làm lại bài thi</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const QUIZ_DATA = {
            title: "Đề Ôn Tập Đạo Hàm - Mã đề 03",
            time: 45,
            questions: [
                {
                text: "Câu 1 (Nhận biết): Tính đạo hàm của hàm số y = x⁷.",
                options: [
                "y' = 7x⁶",
                "y' = 7x",
                "y' = x⁶",
                "y' = 6x⁷"
                ],
                correct: 0,
                explanation: "Áp dụng công thức (xⁿ)' = n.xⁿ⁻¹. Ta có (x⁷)' = 7x⁶."
                },
                {
                text: "Câu 2 (Nhận biết): Đạo hàm của hàm số y = cos(x) là:",
                options: [
                "y' = -sin(x)",
                "y' = sin(x)",
                "y' = cos(x)",
                "y' = -cos(x)"
                ],
                correct: 0,
                explanation: "Theo bảng đạo hàm các hàm số lượng giác cơ bản, (cos x)' = -sin x."
                },
                {
                text: "Câu 3 (Nhận biết): Tính đạo hàm của hàm số y = 1/x (với x khác 0).",
                options: [
                "y' = -1/x²",
                "y' = 1/x²",
                "y' = -1/x",
                "y' = ln(x)"
                ],
                correct: 0,
                explanation: "Đạo hàm cơ bản (1/x)' = -1/x²."
                },
                {
                text: "Câu 4 (Nhận biết): Cho hàm số y = 5x - 2. Tính y'.",
                options: [
                "y' = 5",
                "y' = 5x",
                "y' = -2",
                "y' = 0"
                ],
                correct: 0,
                explanation: "Đạo hàm của ax + b là a. Ở đây a = 5."
                },
                {
                text: "Câu 5 (Nhận biết): Đạo hàm của hàm số y = cot(x) là:",
                options: [
                "y' = -1 / sin²(x)",
                "y' = 1 / sin²(x)",
                "y' = -1 / cos²(x)",
                "y' = 1 / cos²(x)"
                ],
                correct: 0,
                explanation: "Theo công thức đạo hàm lượng giác: (cot x)' = -1/sin²x = -(1 + cot²x)."
                },
                {
                text: "Câu 6 (Thông hiểu): Tính đạo hàm của hàm số y = (x - 1).(x² + x + 1).",
                options: [
                "y' = 3x²",
                "y' = 3x² - 1",
                "y' = 2x + 1",
                "y' = 3x² + 2x"
                ],
                correct: 0,
                explanation: "Nhận xét y = x³ - 1 (hằng đẳng thức). Đạo hàm y' = 3x²."
                },
                {
                text: "Câu 7 (Thông hiểu): Tính đạo hàm của hàm số y = căn(x² + 3).",
                options: [
                "y' = x / căn(x² + 3)",
                "y' = 2x / căn(x² + 3)",
                "y' = 1 / [2.căn(x² + 3)]",
                "y' = 2 / căn(x² + 3)"
                ],
                correct: 0,
                explanation: "y' = (x²+3)' / [2.căn(x²+3)] = 2x / [2.căn(x²+3)] = x / căn(x² + 3)."
                },
                {
                text: "Câu 8 (Thông hiểu): Cho hàm số f(x) = cos(3x). Tính f'(π/6).",
                options: [
                "-3",
                "0",
                "3",
                "-1"
                ],
                correct: 0,
                explanation: "f'(x) = -3.sin(3x). Tại x = π/6: f'(π/6) = -3.sin(π/2) = -3.1 = -3."
                },
                {
                text: "Câu 9 (Thông hiểu): Tính đạo hàm của hàm số y = (x + 3) / (2x - 1).",
                options: [
                "y' = -7 / (2x - 1)²",
                "y' = 7 / (2x - 1)²",
                "y' = -5 / (2x - 1)²",
                "y' = 1 / (2x - 1)²"
                ],
                correct: 0,
                explanation: "Công thức nhanh: (1.(-1) - 3.2) / (2x - 1)² = -7 / (2x - 1)²."
                },
                {
                text: "Câu 10 (Thông hiểu): Tính đạo hàm cấp hai của hàm số y = sin(x).",
                options: [
                "y'' = -sin(x)",
                "y'' = cos(x)",
                "y'' = -cos(x)",
                "y'' = sin(x)"
                ],
                correct: 0,
                explanation: "y' = cos(x). Đạo hàm tiếp y'' = -sin(x)."
                },
                {
                text: "Câu 11 (Vận dụng thấp): Một vật rơi tự do có phương trình s(t) = 5t². Tính vận tốc tại thời điểm t = 4.",
                options: [
                "40",
                "20",
                "80",
                "10"
                ],
                correct: 0,
                explanation: "v(t) = s'(t) = 10t. Tại t = 4, v = 10.4 = 40."
                },
                {
                text: "Câu 12 (Vận dụng thấp): Hệ số góc của tiếp tuyến đồ thị y = x³ tại điểm có hoành độ x = -1 là:",
                options: [
                "3",
                "-3",
                "1",
                "-1"
                ],
                correct: 0,
                explanation: "y' = 3x². Tại x = -1, k = 3.(-1)² = 3."
                },
                {
                text: "Câu 13 (Vận dụng thấp): Giải phương trình f'(x) = 0 biết f(x) = x³ - 12x + 1.",
                options: [
                "x = ±2",
                "x = ±4",
                "x = 0",
                "x = 2"
                ],
                correct: 0,
                explanation: "f'(x) = 3x² - 12. Cho 3x² - 12 = 0 <=> x² = 4 <=> x = ±2."
                },
                {
                text: "Câu 14 (Vận dụng thấp): Đạo hàm của hàm số y = cos²(x) là:",
                options: [
                "y' = -sin(2x)",
                "y' = sin(2x)",
                "y' = -2.cos(x)",
                "y' = 2.sin(x)"
                ],
                correct: 0,
                explanation: "y' = 2.cos(x).(cos x)' = 2.cos(x).(-sin x) = -sin(2x)."
                },
                {
                text: "Câu 15 (Vận dụng thấp): Tính đạo hàm của hàm số y = (x + 1)¹⁰ tại x = -1.",
                options: [
                "0",
                "10",
                "1",
                "-10"
                ],
                correct: 0,
                explanation: "y' = 10.(x + 1)⁹. Tại x = -1, y' = 10.0 = 0."
                },
                {
                text: "Câu 16 (Vận dụng trung bình): Viết phương trình tiếp tuyến của y = x² - 4x + 3 tại điểm có hệ số góc bằng 2.",
                options: [
                "y = 2x - 6",
                "y = 2x + 6",
                "y = 2x - 3",
                "y = 2x"
                ],
                correct: 0,
                explanation: "y' = 2x - 4. Cho 2x - 4 = 2 <=> x = 3. Khi x = 3, y = 3² - 4.3 + 3 = 0. PTTT: y = 2(x-3) + 0 = 2x - 6."
                },
                {
                text: "Câu 17 (Vận dụng trung bình): Cho hàm số y = 1 / (x - 1). Khẳng định nào sau đây đúng?",
                options: [
                "y'' + 2y' = 0",
                "y'' + 2y² = 0",
                "y'' . y = 2(y')²",
                "y'' - 2y³ = 0"
                ],
                correct: 3,
                explanation: "y' = -1/(x-1)². y'' = 2/(x-1)³. Mà y³ = 1/(x-1)³. Vậy y'' = 2y³ hay y'' - 2y³ = 0."
                },
                {
                text: "Câu 18 (Vận dụng trung bình): Tìm m để hàm số y = -x³/3 + x² + mx + 1 có đạo hàm luôn không dương với mọi x thuộc R.",
                options: [
                "m <= -1",
                "m >= -1",
                "m < -1",
                "m = 0"
                ],
                correct: 0,
                explanation: "y' = -x² + 2x + m. Để y' <= 0 với mọi x thì Delta' = 1² - (-1).m <= 0 <=> 1 + m <= 0 <=> m <= -1."
                },
                {
                text: "Câu 19 (Vận dụng trung bình): Tính đạo hàm của hàm số y = căn(sin x + 1).",
                options: [
                "y' = cos x / [2.căn(sin x + 1)]",
                "y' = -cos x / [2.căn(sin x + 1)]",
                "y' = 1 / [2.căn(sin x + 1)]",
                "y' = cos x"
                ],
                correct: 0,
                explanation: "Đạo hàm hàm hợp căn u: u'/2căn u. Ở đây u = sin x + 1 nên u' = cos x."
                },
                {
                text: "Câu 20 (Vận dụng trung bình): Một chất điểm chuyển động s(t) = t³ - 3t + 2. Tính vận tốc tại thời điểm gia tốc bằng 12.",
                options: [
                "9",
                "12",
                "6",
                "3"
                ],
                correct: 0,
                explanation: "v(t) = 3t² - 3. a(t) = 6t. Cho 6t = 12 <=> t = 2. Tại t = 2, v = 3.2² - 3 = 9."
                },

                text: "Câu 21 (Vận dụng trung bình): Cho f(x) = tan(2x). Tính f''(0).",
                options: [
                "0",
                "2",
                "4",
                "8"
                ],
                correct: 0,
                explanation: "f'(x) = 2/cos²(2x). f''(x) = 2.(-2).cos(2x).(-2.sin 2x) / cos⁴(2x) = 8.sin(2x)/cos³(2x). Tại x=0, f''(0)=0."
                },
                {
                text: "Câu 22 (Vận dụng trung bình): Viết phương trình tiếp tuyến của y = x⁴ - 2x² + 1 tại điểm cực đại (x = 0).",
                options: [
                "y = 1",
                "y = 0",
                "y = x",
                "y = -1"
                ],
                correct: 0,
                explanation: "Tại x = 0, y = 1. y' = 4x³ - 4x. y'(0) = 0. PTTT: y = 0(x-0) + 1 => y = 1."
                },
                {
                text: "Câu 23 (Vận dụng trung bình): Tính đạo hàm của hàm số y = (x + 1) / căn x.",
                options: [
                "y' = (x - 1) / (2x.căn x)",
                "y' = (x + 1) / (2x.căn x)",
                "y' = 1 / (2.căn x)",
                "y' = (1 - x) / (2x.căn x)"
                ],
                correct: 0,
                explanation: "y = căn x + 1/căn x. y' = 1/(2căn x) - 1/(2x.căn x) = (x - 1) / (2x.căn x)."
                },
                {
                text: "Câu 24 (Vận dụng cao): Cho f(x) = (x - 1).(x - 2)...(x - 10). Tính f'(1).",
                options: [
                "-362880",
                "362880",
                "0",
                "1"
                ],
                correct: 0,
                explanation: "Dùng quy tắc đạo hàm tích. f'(1) = 1.(1-2).(1-3)...(1-10) = (-1).(-2)...(-9) = (-1)⁹.9! = -362880."
                },
                {
                text: "Câu 25 (Vận dụng cao): Cho y = căn(2x + 1). Khẳng định nào sau đây đúng về đạo hàm cấp hai?",
                options: [
                "y³ . y'' + 1 = 0",
                "y . y'' + 1 = 0",
                "y'' + y³ = 0",
                "y'' = 1/y"
                ],
                correct: 0,
                explanation: "y' = 1/căn(2x+1) = 1/y. y'' = (1/y)' = -y'/y² = -(1/y)/y² = -1/y³. Vậy y³.y'' + 1 = 0."
                }
                ]
        };

        let currentIdx = 0;
        let userAnswers = new Array(QUIZ_DATA.questions.length).fill(null);
        let isSubmitted = false;
        let secondsLeft = QUIZ_DATA.time * 60;
        let timerInterval;

        const qText = document.getElementById('q-text');
        const optionsList = document.getElementById('options-list');
        const navGrid = document.getElementById('nav-grid');
        const timerDisplay = document.getElementById('timer');

        function init() {
            navGrid.innerHTML = '';
            QUIZ_DATA.questions.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = i + 1;
                item.id = `nav-${i}`;
                item.onclick = () => { currentIdx = i; renderQuestion(); };
                navGrid.appendChild(item);
            });
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const data = QUIZ_DATA.questions[currentIdx];
            document.getElementById('q-current').innerText = currentIdx + 1;
            qText.innerText = data.text; // Sửa lỗi gọi thuộc tính .q thành .text
            
            optionsList.innerHTML = '';
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (userAnswers[currentIdx] === i) div.classList.add('selected');
                
                if (isSubmitted) {
                    div.classList.add('disabled');
                    if (i === data.correct) div.classList.add('correct');
                    if (userAnswers[currentIdx] === i && i !== data.correct) div.classList.add('wrong');
                } else {
                    div.onclick = () => selectOption(i);
                }

                div.innerHTML = `<span style="font-weight:bold; margin-right:10px">${String.fromCharCode(65+i)}.</span> <span>${opt}</span>`;
                optionsList.appendChild(div);
            });

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === QUIZ_DATA.questions.length - 1;

            const expBox = document.getElementById('explanation-box');
            if (isSubmitted) {
                expBox.classList.remove('hidden');
                document.getElementById('explanation-text').innerText = data.explanation; // Sửa lỗi thuộc tính .explain thành .explanation
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            document.getElementById(`nav-${currentIdx}`).classList.add('done');
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isSubmitted) return;
                secondsLeft--;
                const m = Math.floor(secondsLeft / 60);
                const s = secondsLeft % 60;
                timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
            }, 1000);
        }

        function finishQuiz() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            let score = 0;
            userAnswers.forEach((ans, i) => {
                const navItem = document.getElementById(`nav-${i}`);
                if (ans === QUIZ_DATA.questions[i].correct) {
                    score++;
                    navItem.classList.add('correct');
                } else {
                    navItem.classList.add('wrong');
                }
            });

            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('score-percent').innerText = Math.round((score/QUIZ_DATA.questions.length)*100) + "%";
            renderQuestion();
        }

        document.getElementById('next-btn').onclick = () => { if (currentIdx < QUIZ_DATA.questions.length - 1) { currentIdx++; renderQuestion(); } };
        document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) { currentIdx--; renderQuestion(); } };
        document.getElementById('submit-btn').onclick = () => { if (confirm("Bạn có chắc chắn muốn nộp bài?")) finishQuiz(); };

        init();
    </script>
</body>
</html>
