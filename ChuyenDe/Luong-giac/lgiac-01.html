<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng luyện đề trắc nghiệm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="website icon" type="jpg" href="../../logo.jpg">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 10px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .timer-container {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .q-badge {
            background: rgba(248, 94, 56, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        #q-text { margin: 15px 0; font-size: 1.15rem; font-weight: 500; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option:hover:not(.disabled) { background: rgba(0, 94, 255, 0.07); border-color: var(--text-secondary); }
        .option.selected { border-color: var(--primary); background: rgba(0, 157, 255, 0.1); }
        .option.correct { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .option.wrong { border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .option.disabled { cursor: default; }

        .controls { display: flex; justify-content: space-between; margin-top: 20px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; justify-content: center; margin-top: 15px; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 100%; justify-content: center; margin-top: 10px; }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .nav-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-item.active { border-color: var(--primary); color: var(--primary); outline: 2px solid rgba(56,189,248,0.2); }
        .nav-item.done { background: #334155; color: #fff; }
        .nav-item.correct { background: var(--success); color: #fff; border-color: var(--success); }
        .nav-item.wrong { background: var(--error); color: #fff; border-color: var(--error); }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .hidden { display: none; }
        
        .score-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
        }
        #score-percent { text-align: center; color: var(--text-secondary); font-weight: bold; }
        /* Màu xanh dương đậm khi chọn */
        .option.selected {
            background-color: #2aa2d6 !important; 
            border-color: #1d4ed8 !important;
            color: #ffffff !important; /* Chữ trắng cho nổi bật */
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 5px; }
            
            header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                padding: 10px;
            }

            .main-layout {
                grid-template-columns: 1fr; /* Chuyển thành 1 cột */
            }

            .quiz-section { order: 1; }
            .sidebar { order: 2; }

            .timer-container { font-size: 1.2rem; width: 100%; justify-content: center; display: flex; }
            
            .q-text { font-size: 1.05rem; }
            .option { padding: 12px; font-size: 0.95rem; }
            
            .controls button {
                flex: 1;
                padding: 15px 10px; /* Tăng diện tích chạm */
                font-size: 0.9rem;
            }

            .nav-grid {
                grid-template-columns: repeat(5, 1fr); /* Hiển thị 5 ô trên 1 hàng cho gọn */
            }
        }
    </style>
</head>
<body>
    <!-- Nút quay lại -->
    <div style="padding: 10px; max-width: 1100px; margin: 0 auto;">
        <button onclick="window.history.back()" class="btn btn-secondary" style="width: auto; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Quay lại
        </button>
    </div>
    <div class="container">
        <header>
            <div class="header-info">
                <h1 id="quiz-title">Lượng Giác - Mã đề 01</h1>
                <p id="quiz-subtitle">Thời gian: <span id="limit-time">45</span> phút</p>
            </div>
            <div class="timer-container">
                <i class="fas fa-clock"></i>
                <span id="timer">45:00</span>
            </div>
        </header>

        <div class="main-layout">
            <div class="quiz-section">
                <div id="question-card" class="card">
                    <div class="card-header">
                        <span class="q-badge">Câu <span id="q-current">1</span>/25</span>
                    </div>
                    <h2 id="q-text">Đang tải...</h2>
                    <div id="options-list" class="options-list"></div>
                    <div id="explanation-box" class="explanation-box hidden">
                        <strong><i class="fas fa-lightbulb"></i> Giải thích:</strong>
                        <p id="explanation-text" style="margin-top:5px; color: var(--text-secondary);"></p>
                    </div>
                </div>

                <div class="controls">
                    <button id="prev-btn" class="btn btn-secondary"><i class="fas fa-chevron-left"></i> Câu trước</button>
                    <button id="next-btn" class="btn btn-secondary">Câu sau <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="card">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">Tiến trình làm bài</h3>
                    <div id="nav-grid" class="nav-grid"></div>
                    <button id="submit-btn" class="btn btn-primary">NỘP BÀI</button>
                </div>

                <div id="result-card" class="card hidden">
                    <h3 style="text-align: center;">KẾT QUẢ</h3>
                    <div class="score-display">
                        <span id="score-val">0</span>/<span id="total-val">25</span>
                    </div>
                    <p id="score-percent">0%</p>
                    <button onclick="location.reload()" class="btn btn-outline">Làm lại bài thi</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const QUIZ_DATA = {
            title: "Đề Ôn Tập Lượng Giác - Mã đề 01",
            time: 45,
            questions: [
{
text: "Câu 1 (Nhận biết): Đổi số đo của góc α = 30° sang đơn vị radian.",
options: [
"π/6",
"π/3",
"π/4",
"π/2"
],
correct: 0,
explanation: "α (rad) = α (độ) . π / 180 = 30 . π / 180 = π/6."
},
{
text: "Câu 2 (Nhận biết): Trong các công thức sau, công thức nào đúng?",
options: [
"sin² x + cos² x = 1",
"sin² x - cos² x = 1",
"sin x + cos x = 1",
"tan x . cot x = -1"
],
correct: 0,
explanation: "Đây là hằng đẳng thức lượng giác cơ bản."
},
{
text: "Câu 3 (Nhận biết): Công thức nhân đôi nào sau đây là sai?",
options: [
"cos 2x = cos² x + sin² x",
"sin 2x = 2.sin x . cos x",
"cos 2x = 2.cos² x - 1",
"cos 2x = 1 - 2.sin² x"
],
correct: 0,
explanation: "Công thức đúng phải là cos 2x = cos² x - sin² x."
},
{
text: "Câu 4 (Nhận biết): Tập giá trị của hàm số y = sin x là:",
options: [
"[-1; 1]",
"(-1; 1)",
"R",
"[0; 1]"
],
correct: 0,
explanation: "Hàm số sin x luôn nhận giá trị từ -1 đến 1."
},
{
text: "Câu 5 (Nhận biết): Nghiệm của phương trình tan x = tan α là:",
options: [
"x = α + kπ",
"x = α + k2π",
"x = ±α + kπ",
"x = π - α + kπ"
],
correct: 0,
explanation: "Theo công thức nghiệm cơ bản của phương trình tan."
},
{
text: "Câu 6 (Thông hiểu): Cho cos α = -4/5 với π < α < 3π/2. Tính sin α.",
options: [
"-3/5",
"3/5",
"±3/5",
"9/25"
],
correct: 0,
explanation: "sin² α = 1 - cos² α = 9/25. Vì α thuộc góc phần tư thứ III nên sin α < 0 => sin α = -3/5."
},
{
text: "Câu 7 (Thông hiểu): Rút gọn biểu thức A = sin(π - x) + cos(π/2 - x).",
options: [
"2.sin x",
"0",
"sin x + cos x",
"2.cos x"
],
correct: 0,
explanation: "sin(π - x) = sin x; cos(π/2 - x) = sin x. Vậy A = 2.sin x."
},
{
text: "Câu 8 (Thông hiểu): Tính giá trị của biểu thức P = cos 75° . cos 15°.",
options: [
"1/4",
"1/2",
"√3/4",
"0"
],
correct: 0,
explanation: "P = 1/2 . [cos(75-15) + cos(75+15)] = 1/2 . [cos 60° + cos 90°] = 1/2 . [1/2 + 0] = 1/4."
},
{
text: "Câu 9 (Thông hiểu): Tập xác định của hàm số y = tan x là:",
options: [
"D = R \ {π/2 + kπ}",
"D = R \ {kπ}",
"D = R",
"D = R \ {π/2 + k2π}"
],
correct: 0,
explanation: "Hàm số tan x xác định khi cos x ≠ 0 ⇔ x ≠ π/2 + kπ."
},
{
text: "Câu 10 (Thông hiểu): Nghiệm của phương trình cos x = -1/2 là:",
options: [
"x = ±2π/3 + k2π",
"x = ±π/3 + k2π",
"x = ±5π/6 + k2π",
"x = ±π/6 + k2π"
],
correct: 0,
explanation: "cos x = cos(2π/3) ⇔ x = ±2π/3 + k2π."
},
{
text: "Câu 11 (Thông hiểu): Cho tan α = 2. Tính giá trị biểu thức A = (sin α + cos α) / (sin α - cos α).",
options: [
"3",
"1/3",
"-3",
"2"
],
correct: 0,
explanation: "Chia cả tử và mẫu cho cos α: A = (tan α + 1) / (tan α - 1) = (2 + 1) / (2 - 1) = 3."
},
{
text: "Câu 12 (Thông hiểu): Chu kỳ tuần hoàn của hàm số y = sin 2x là:",
options: [
"π",
"2π",
"π/2",
"4π"
],
correct: 0,
explanation: "Chu kỳ T = 2π / |ω| = 2π / 2 = π."
},
{
text: "Câu 13 (Thông hiểu): Số nghiệm của phương trình sin x = 0 trên đoạn [0; 2π] là:",
options: [
"3",
"2",
"1",
"4"
],
correct: 0,
explanation: "x = kπ. Các nghiệm thuộc [0; 2π] là 0, π, 2π. Tổng cộng 3 nghiệm."
},
{
text: "Câu 14 (Thông hiểu): Công thức nào sau đây dùng để biến đổi tích thành tổng đúng?",
options: [
"cos a . cos b = 1/2 . [cos(a-b) + cos(a+b)]",
"sin a . sin b = 1/2 . [cos(a-b) + cos(a+b)]",
"sin a . cos b = 1/2 . [sin(a-b) + sin(a+b)]",
"cos a . cos b = 1/2 . [sin(a-b) + sin(a+b)]"
],
correct: 0,
explanation: "Theo công thức biến đổi tích thành tổng."
},
{
text: "Câu 15 (Thông hiểu): Giá trị lớn nhất của hàm số y = 3.sin x - 4 là:",
options: [
"-1",
"7",
"-7",
"3"
],
correct: 0,
explanation: "Max y = 3(1) - 4 = -1."
},
{
text: "Câu 16 (Vận dụng): Tính giá trị của biểu thức A = sin² 10° + sin² 20° + ... + sin² 80°.",
options: [
"4",
"8",
"2",
"4,5"
],
correct: 0,
explanation: "Cặp (sin² 10 + sin² 80) = (sin² 10 + cos² 10) = 1. Có 4 cặp như vậy, kết quả là 4."
},
{
text: "Câu 17 (Vận dụng): Phương trình sin x + cos x = 1 có bao nhiêu nghiệm thuộc khoảng (0; π)?",
options: [
"1",
"2",
"0",
"3"
],
correct: 0,
explanation: "√2.sin(x + π/4) = 1 ⇔ sin(x + π/4) = 1/√2 ⇔ x = 0 (loại) hoặc x = π/2 (nhận). Vậy có 1 nghiệm."
},
{
text: "Câu 18 (Vận dụng): Cho sin α + cos α = 1/2. Tính giá trị của sin 2α.",
options: [
"-3/4",
"3/4",
"1/4",
"-1/4"
],
correct: 0,
explanation: "(sin α + cos α)² = 1/4 ⇔ 1 + sin 2α = 1/4 ⇔ sin 2α = -3/4."
},
{
text: "Câu 19 (Vận dụng): Tìm m để phương trình sin x = m - 1 có nghiệm.",
options: [
"0 ≤ m ≤ 2",
"m ≥ 0",
"m ≤ 2",
"-1 ≤ m ≤ 1"
],
correct: 0,
explanation: "ĐK có nghiệm: -1 ≤ m - 1 ≤ 1 ⇔ 0 ≤ m ≤ 2."
},
{
text: "Câu 20 (Vận dụng): Rút gọn biểu thức P = (sin 3x - sin x) / (cos 3x + cos x).",
options: [
"tan x",
"cot x",
"tan 2x",
"cot 2x"
],
correct: 0,
explanation: "P = [2.cos 2x . sin x] / [2.cos 2x . cos x] = sin x / cos x = tan x."
},
{
text: "Câu 21 (Vận dụng): Giải phương trình sin² x - 3.sin x + 2 = 0.",
options: [
"x = π/2 + k2π",
"x = kπ",
"x = π/2 + kπ",
"Vô nghiệm"
],
correct: 0,
explanation: "Đặt t = sin x (-1 ≤ t ≤ 1). t² - 3t + 2 = 0 ⇔ t = 1 (nhận) hoặc t = 2 (loại). sin x = 1 ⇔ x = π/2 + k2π."
},
{
text: "Câu 22 (Vận dụng): Cho tan(x + π/4) = 3. Tính tan x.",
options: [
"1/2",
"2",
"1/3",
"3"
],
correct: 0,
explanation: "(tan x + 1) / (1 - tan x) = 3 ⇔ tan x + 1 = 3 - 3.tan x ⇔ 4.tan x = 2 ⇔ tan x = 1/2."
},
{
text: "Câu 23 (Vận dụng): Tìm tất cả các nghiệm của phương trình cos 2x - cos x = 0.",
options: [
"x = k2π/3 hoặc x = k2π",
"x = kπ/3",
"x = k2π",
"x = kπ"
],
correct: 0,
explanation: "cos 2x = cos x ⇔ 2x = x + k2π hoặc 2x = -x + k2π. Giải ra x = k2π hoặc x = k2π/3."
},
{
text: "Câu 24 (Vận dụng): Tính tổng các nghiệm của phương trình sin(2x - π/4) = sin(x + 3π/4) trên khoảng (0; π).",
options: [
"π",
"2π",
"π/2",
"3π/4"
],
correct: 0,
explanation: "Giải phương trình ta được x = π + k2π (loại) hoặc x = π/4 + k2π/3. Với k=0, x = π/4 (nhận). Chỉ có 1 nghiệm π/4."
},
{
text: "Câu 25 (Vận dụng): Cho tam giác ABC. Khẳng định nào sau đây là sai?",
options: [
"sin(A+B) = -sin C",
"cos(A+B) = -cos C",
"sin((A+B)/2) = cos(C/2)",
"tan(A+B) = -tan C"
],
correct: 0,
explanation: "A+B = π - C nên sin(A+B) = sin(π - C) = sin C. Vậy khẳng định sin(A+B) = -sin C là sai."
}
]
        };

        let currentIdx = 0;
        let userAnswers = new Array(QUIZ_DATA.questions.length).fill(null);
        let isSubmitted = false;
        let secondsLeft = QUIZ_DATA.time * 60;
        let timerInterval;

        const qText = document.getElementById('q-text');
        const optionsList = document.getElementById('options-list');
        const navGrid = document.getElementById('nav-grid');
        const timerDisplay = document.getElementById('timer');

        function init() {
            navGrid.innerHTML = '';
            QUIZ_DATA.questions.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = i + 1;
                item.id = `nav-${i}`;
                item.onclick = () => { currentIdx = i; renderQuestion(); };
                navGrid.appendChild(item);
            });
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const data = QUIZ_DATA.questions[currentIdx];
            document.getElementById('q-current').innerText = currentIdx + 1;
            qText.innerText = data.text; // Sửa lỗi gọi thuộc tính .q thành .text
            
            optionsList.innerHTML = '';
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (userAnswers[currentIdx] === i) div.classList.add('selected');
                
                if (isSubmitted) {
                    div.classList.add('disabled');
                    if (i === data.correct) div.classList.add('correct');
                    if (userAnswers[currentIdx] === i && i !== data.correct) div.classList.add('wrong');
                } else {
                    div.onclick = () => selectOption(i);
                }

                div.innerHTML = `<span style="font-weight:bold; margin-right:10px">${String.fromCharCode(65+i)}.</span> <span>${opt}</span>`;
                optionsList.appendChild(div);
            });

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === QUIZ_DATA.questions.length - 1;

            const expBox = document.getElementById('explanation-box');
            if (isSubmitted) {
                expBox.classList.remove('hidden');
                document.getElementById('explanation-text').innerText = data.explanation; // Sửa lỗi thuộc tính .explain thành .explanation
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            document.getElementById(`nav-${currentIdx}`).classList.add('done');
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isSubmitted) return;
                secondsLeft--;
                const m = Math.floor(secondsLeft / 60);
                const s = secondsLeft % 60;
                timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
            }, 1000);
        }

        function finishQuiz() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            let score = 0;
            userAnswers.forEach((ans, i) => {
                const navItem = document.getElementById(`nav-${i}`);
                if (ans === QUIZ_DATA.questions[i].correct) {
                    score++;
                    navItem.classList.add('correct');
                } else {
                    navItem.classList.add('wrong');
                }
            });

            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('score-percent').innerText = Math.round((score/QUIZ_DATA.questions.length)*100) + "%";
            renderQuestion();
        }

        document.getElementById('next-btn').onclick = () => { if (currentIdx < QUIZ_DATA.questions.length - 1) { currentIdx++; renderQuestion(); } };
        document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) { currentIdx--; renderQuestion(); } };
        document.getElementById('submit-btn').onclick = () => { if (confirm("Bạn có chắc chắn muốn nộp bài?")) finishQuiz(); };

        init();
    </script>
</body>
</html>
