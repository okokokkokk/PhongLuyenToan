<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng luyện đề trắc nghiệm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="website icon" type="jpg" href="../../logo.jpg">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 10px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .timer-container {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .q-badge {
            background: rgba(248, 94, 56, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        #q-text { margin: 15px 0; font-size: 1.15rem; font-weight: 500; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option:hover:not(.disabled) { background: rgba(0, 94, 255, 0.07); border-color: var(--text-secondary); }
        .option.selected { border-color: var(--primary); background: rgba(0, 157, 255, 0.1); }
        .option.correct { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .option.wrong { border-color: var(--error); color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .option.disabled { cursor: default; }

        .controls { display: flex; justify-content: space-between; margin-top: 20px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; justify-content: center; margin-top: 15px; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); width: 100%; justify-content: center; margin-top: 10px; }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .nav-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-item.active { border-color: var(--primary); color: var(--primary); outline: 2px solid rgba(56,189,248,0.2); }
        .nav-item.done { background: #334155; color: #fff; }
        .nav-item.correct { background: var(--success); color: #fff; border-color: var(--success); }
        .nav-item.wrong { background: var(--error); color: #fff; border-color: var(--error); }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .hidden { display: none; }
        
        .score-display {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
        }
        #score-percent { text-align: center; color: var(--text-secondary); font-weight: bold; }
        /* Màu xanh dương đậm khi chọn */
        .option.selected {
            background-color: #2aa2d6 !important; 
            border-color: #1d4ed8 !important;
            color: #ffffff !important; /* Chữ trắng cho nổi bật */
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* --- RESPONSIVE CHO ĐIỆN THOẠI --- */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 5px; }
            
            header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                padding: 10px;
            }

            .main-layout {
                grid-template-columns: 1fr; /* Chuyển thành 1 cột */
            }

            .quiz-section { order: 1; }
            .sidebar { order: 2; }

            .timer-container { font-size: 1.2rem; width: 100%; justify-content: center; display: flex; }
            
            .q-text { font-size: 1.05rem; }
            .option { padding: 12px; font-size: 0.95rem; }
            
            .controls button {
                flex: 1;
                padding: 15px 10px; /* Tăng diện tích chạm */
                font-size: 0.9rem;
            }

            .nav-grid {
                grid-template-columns: repeat(5, 1fr); /* Hiển thị 5 ô trên 1 hàng cho gọn */
            }
        }
    </style>
</head>
<body>
    <!-- Nút quay lại -->
    <div style="padding: 10px; max-width: 1100px; margin: 0 auto;">
        <button onclick="window.history.back()" class="btn btn-secondary" style="width: auto; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Quay lại
        </button>
    </div>
    <div class="container">
        <header>
            <div class="header-info">
                <h1 id="quiz-title">Xác suất - Mã đề 02</h1>
                <p id="quiz-subtitle">Thời gian: <span id="limit-time">45</span> phút</p>
            </div>
            <div class="timer-container">
                <i class="fas fa-clock"></i>
                <span id="timer">45:00</span>
            </div>
        </header>

        <div class="main-layout">
            <div class="quiz-section">
                <div id="question-card" class="card">
                    <div class="card-header">
                        <span class="q-badge">Câu <span id="q-current">1</span>/25</span>
                    </div>
                    <h2 id="q-text">Đang tải...</h2>
                    <div id="options-list" class="options-list"></div>
                    <div id="explanation-box" class="explanation-box hidden">
                        <strong><i class="fas fa-lightbulb"></i> Giải thích:</strong>
                        <p id="explanation-text" style="margin-top:5px; color: var(--text-secondary);"></p>
                    </div>
                </div>

                <div class="controls">
                    <button id="prev-btn" class="btn btn-secondary"><i class="fas fa-chevron-left"></i> Câu trước</button>
                    <button id="next-btn" class="btn btn-secondary">Câu sau <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <aside class="sidebar">
                <div class="card">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">Tiến trình làm bài</h3>
                    <div id="nav-grid" class="nav-grid"></div>
                    <button id="submit-btn" class="btn btn-primary">NỘP BÀI</button>
                </div>

                <div id="result-card" class="card hidden">
                    <h3 style="text-align: center;">KẾT QUẢ</h3>
                    <div class="score-display">
                        <span id="score-val">0</span>/<span id="total-val">25</span>
                    </div>
                    <p id="score-percent">0%</p>
                    <button onclick="location.reload()" class="btn btn-outline">Làm lại bài thi</button>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const QUIZ_DATA = {
            title: "Đề Ôn Tập Xác Suất - Mã đề 02",
            time: 45,
            questions: [
                {
                text: "Câu 1. Một hộp đựng 10 linh kiện, trong đó có 3 linh kiện bị lỗi. Lấy ngẫu nhiên lần lượt 2 linh kiện không hoàn lại. Tính xác suất để linh kiện thứ hai bị lỗi biết rằng linh kiện thứ nhất đã bị lỗi.",
                options: ["3/10", "2/10", "2/9", "3/9"],
                correct: 2,
                explanation: "Sau khi lấy linh kiện thứ nhất bị lỗi, còn 9 linh kiện, trong đó 2 bị lỗi. Xác suất = 2/9."
                },
                {
                text: "Câu 2. Xác suất để một máy hoạt động tốt trong một ngày là 0.9. Có 3 máy độc lập. Tính xác suất có ít nhất 2 máy tốt.",
                options: ["0.729", "0.972", "0.810", "0.243"],
                correct: 1,
                explanation: "3 máy tốt: 0.9^3 = 0.729. 2 máy tốt: C(3,2)*0.9^2*0.1 = 0.243. Tổng = 0.972."
                },
                {
                text: "Câu 3. Túi I: 4 dâu, 6 bạc hà. Túi II: 5 dâu, 3 bạc hà. Chọn ngẫu nhiên 1 túi rồi lấy 1 kẹo. Tính xác suất lấy kẹo dâu.",
                options: ["1/2", "21/40", "41/80", "9/18"],
                correct: 2,
                explanation: "P = 1/2*4/10 + 1/2*5/8 = 1/5 + 5/16 = 41/80."
                },
                {
                text: "Câu 4. Xạ thủ bắn 3 viên, xác suất trúng mỗi lần là 0.7. Tính xác suất trúng đúng 1 lần.",
                options: ["0.343", "0.063", "0.189", "0.441"],
                correct: 2,
                explanation: "C(3,1)*0.7*0.3^2 = 3*0.7*0.09 = 0.189."
                },
                {
                text: "Câu 5. Tỷ lệ mắc bệnh là 5%. Test đúng 90%. Người có kết quả dương tính. Tính xác suất thực sự mắc bệnh.",
                options: ["45.00%", "32.14%", "90.00%", "5.00%"],
                correct: 1,
                explanation: "P = (0.05*0.9) / (0.05*0.9 + 0.95*0.1) = 0.3214 ≈ 32.14%."
                },
                {
                text: "Câu 6. Rút 3 quân từ bộ 52 lá. Tính xác suất cả 3 là J,Q,K.",
                options: ["1/13", "3/52", "11/1105", "12/52"],
                correct: 2,
                explanation: "C(12,3)/C(52,3) = 220/22100 = 11/1105."
                },
                {
                text: "Câu 7. Hai bộ phận hỏng với xác suất 0.2 và 0.15. Tính xác suất thiết bị vẫn hoạt động.",
                options: ["0.32", "0.85", "0.68", "0.35"],
                correct: 2,
                explanation: "Không hỏng: 0.8*0.85 = 0.68."
                },
                {
                text: "Câu 8. Gieo 2 xúc xắc. Biết tổng chẵn. Tính xác suất có ít nhất một mặt 6.",
                options: ["1/6", "5/18", "1/3", "3/18"],
                correct: 1,
                explanation: "Có 5 trường hợp phù hợp trên 18 TH tổng chẵn → 5/18."
                },
                {
                text: "Câu 9. 20 giỏi Toán, 15 giỏi Lý, 10 giỏi cả hai. Tính xác suất chỉ giỏi 1 môn.",
                options: ["20/25", "10/35", "15/25", "25/35"],
                correct: 2,
                explanation: "Chỉ 1 môn: 10 + 5 = 15. Tổng 25 → 15/25."
                },
                {
                text: "Câu 10. 3 người bắn với xác suất 0.5, 0.6, 0.7. Tính xác suất trúng đúng 2 lần.",
                options: ["0.35", "0.44", "0.46", "0.21"],
                correct: 1,
                explanation: "0.5*0.6*0.3 + 0.5*0.4*0.7 + 0.5*0.6*0.7 = 0.44."
                },
                {
                text: "Câu 11. Làm 5 câu trắc nghiệm (4 đáp án), chọn bừa. Tính xác suất đúng ít nhất 1 câu.",
                options: ["1/4", "1 - (1/4)^5", "1 - (3/4)^5", "(1/4)^5"],
                correct: 2,
                explanation: "P = 1 - (3/4)^5."
                },
                {
                text: "Câu 12. Tỷ lệ loại I là 0.8. Lấy 5 sản phẩm. Tính xác suất có đúng 4 loại I.",
                options: ["0.8000", "0.2048", "0.4096", "0.3277"],
                correct: 2,
                explanation: "C(5,4)*0.8^4*0.2 = 0.4096."
                },
                {
                text: "Câu 13. 5 đỏ, 4 xanh. Lấy 3 quả. Tính xác suất có ít nhất 2 đỏ.",
                options: ["3/7", "5/21", "25/42", "10/84"],
                correct: 2,
                explanation: "(40 + 10)/84 = 25/42."
                },
                {
                text: "Câu 14. P(A)=0.7, P(B)=0.4, P(A∪B)=0.82. Hai biến cố có độc lập không?",
                options: ["Không đủ dữ kiện", "Xung khắc", "Có độc lập", "Không độc lập"],
                correct: 2,
                explanation: "P(A)*P(B)=0.28 = P(AB) → độc lập."
                },
                {
                text: "Câu 15. Chọn 2 số từ 1-10. Tính xác suất tổng là số lẻ.",
                options: ["4/9", "1/2", "5/9", "5/10"],
                correct: 2,
                explanation: "1 chẵn 1 lẻ → 25/45 = 5/9."
                },
                {
                text: "Câu 16. Gia đình 3 con, biết có ít nhất 1 trai. Tính xác suất có đúng 2 trai.",
                options: ["1/2", "3/7", "1/3", "3/8"],
                correct: 1,
                explanation: "3/7."
                },
                {
                text: "Câu 17. P(A)=0.4, P(B|A)=0.3, P(B|A_ngang)=0.2. Tính P(A|B).",
                options: ["0.24", "0.4", "0.12", "0.5"],
                correct: 3,
                explanation: "P(B)=0.24 → P(A|B)=0.12/0.24=0.5."
                },
                {
                text: "Câu 18. 3 nhà máy: 50%,30%,20%. Lỗi:1%,2%,3%. Tính xác suất sản phẩm lỗi thuộc NM1.",
                options: ["1/3", "5/100", "5/17", "2/17"],
                correct: 2,
                explanation: "0.005/0.017 = 5/17."
                },
                {
                text: "Câu 19. Rút 2 lá: lá 1 Rô, lá 2 Cơ.",
                options: ["1/16", "13/52", "1/4", "13/204"],
                correct: 3,
                explanation: "(13/52)*(13/51)=13/204."
                },
                {
                text: "Câu 20. Tung xu đến khi ra sấp. Tính xác suất số lần tung ≤ 3.",
                options: ["3/4", "7/8", "1/2", "1/8"],
                correct: 1,
                explanation: "1/2 + 1/4 + 1/8 = 7/8."
                },
                {
                text: "Câu 21. 2 câu độc lập, đúng: 0.8 và 0.7. Tính xác suất đúng đúng 1 câu.",
                options: ["0.14", "0.38", "0.56", "0.44"],
                correct: 1,
                explanation: "0.8*0.3 + 0.2*0.7 = 0.38."
                },
                {
                text: "Câu 22. 10 sp, 2 lỗi. Lấy 3. Tính xác suất có ít nhất 1 lỗi.",
                options: ["1/5", "2/10", "8/15", "7/15"],
                correct: 2,
                explanation: "1 - 7/15 = 8/15."
                },
                {
                text: "Câu 23. Chọn hộp rồi lấy bi đỏ. Tính xác suất là hộp 1.",
                options: ["1/3", "8/10", "1/2", "8/16"],
                correct: 2,
                explanation: "0.8/1.6 = 1/2."
                },
                {
                text: "Câu 24. p=0.001, mua 1000 vé. Tính xác suất trúng ≥1.",
                options: ["0.368", "0.999", "0.632", "0.500"],
                correct: 2,
                explanation: "1 - e^-1 = 0.632."
                },
                {
                text: "Câu 25. 6 trắng, 4 đen. Lấy 2 bi, cùng màu thì lấy tiếp. Tính xác suất lấy 3 bi.",
                options: ["8/15", "1/2", "7/15", "4/15"],
                correct: 2,
                explanation: "(15+6)/45 = 7/15."
                }
            ],
        };

        let currentIdx = 0;
        let userAnswers = new Array(QUIZ_DATA.questions.length).fill(null);
        let isSubmitted = false;
        let secondsLeft = QUIZ_DATA.time * 60;
        let timerInterval;

        const qText = document.getElementById('q-text');
        const optionsList = document.getElementById('options-list');
        const navGrid = document.getElementById('nav-grid');
        const timerDisplay = document.getElementById('timer');

        function init() {
            navGrid.innerHTML = '';
            QUIZ_DATA.questions.forEach((_, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.innerText = i + 1;
                item.id = `nav-${i}`;
                item.onclick = () => { currentIdx = i; renderQuestion(); };
                navGrid.appendChild(item);
            });
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const data = QUIZ_DATA.questions[currentIdx];
            document.getElementById('q-current').innerText = currentIdx + 1;
            qText.innerText = data.text; // Sửa lỗi gọi thuộc tính .q thành .text
            
            optionsList.innerHTML = '';
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (userAnswers[currentIdx] === i) div.classList.add('selected');
                
                if (isSubmitted) {
                    div.classList.add('disabled');
                    if (i === data.correct) div.classList.add('correct');
                    if (userAnswers[currentIdx] === i && i !== data.correct) div.classList.add('wrong');
                } else {
                    div.onclick = () => selectOption(i);
                }

                div.innerHTML = `<span style="font-weight:bold; margin-right:10px">${String.fromCharCode(65+i)}.</span> <span>${opt}</span>`;
                optionsList.appendChild(div);
            });

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${currentIdx}`).classList.add('active');

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === QUIZ_DATA.questions.length - 1;

            const expBox = document.getElementById('explanation-box');
            if (isSubmitted) {
                expBox.classList.remove('hidden');
                document.getElementById('explanation-text').innerText = data.explanation; // Sửa lỗi thuộc tính .explain thành .explanation
            } else {
                expBox.classList.add('hidden');
            }
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            document.getElementById(`nav-${currentIdx}`).classList.add('done');
            renderQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (isSubmitted) return;
                secondsLeft--;
                const m = Math.floor(secondsLeft / 60);
                const s = secondsLeft % 60;
                timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
            }, 1000);
        }

        function finishQuiz() {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            let score = 0;
            userAnswers.forEach((ans, i) => {
                const navItem = document.getElementById(`nav-${i}`);
                if (ans === QUIZ_DATA.questions[i].correct) {
                    score++;
                    navItem.classList.add('correct');
                } else {
                    navItem.classList.add('wrong');
                }
            });

            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('score-val').innerText = score;
            document.getElementById('score-percent').innerText = Math.round((score/QUIZ_DATA.questions.length)*100) + "%";
            renderQuestion();
        }

        document.getElementById('next-btn').onclick = () => { if (currentIdx < QUIZ_DATA.questions.length - 1) { currentIdx++; renderQuestion(); } };
        document.getElementById('prev-btn').onclick = () => { if (currentIdx > 0) { currentIdx--; renderQuestion(); } };
        document.getElementById('submit-btn').onclick = () => { if (confirm("Bạn có chắc chắn muốn nộp bài?")) finishQuiz(); };

        init();
    </script>
</body>
</html>
